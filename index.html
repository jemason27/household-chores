<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mason Household Chores</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.app{max-width:780px;margin:0 auto;padding:1.5rem 1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;border-radius:9px;background:#1F3864;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.app-title{font-size:16px;font-weight:600;color:#1a1a1a}
.app-sub{font-size:12px;color:#888}
.who-toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff}
.who-btn{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:none;color:#666;transition:all .15s}
.who-btn.active{background:#1F3864;color:#fff}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:600;color:#1a1a1a;line-height:1}
.stat-sub{font-size:11px;color:#aaa;margin-top:3px}
.tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:6px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .15s}
.tab.active{background:#1F3864;color:#fff;border-color:#1F3864}
.card{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.col-head{display:grid;align-items:center;padding:8px 16px;font-size:11px;font-weight:600;color:#999;background:#fafafa;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.04em}
.d-grid{grid-template-columns:30px minmax(0,1fr) 90px 82px 80px 30px}
.w-grid{grid-template-columns:30px minmax(0,1fr) 90px 90px 80px 30px}
.m-grid{grid-template-columns:30px minmax(0,1fr) 90px 100px 92px 30px}
.o-grid{grid-template-columns:30px minmax(0,1fr) 90px 100px 110px 30px}
.l-grid{grid-template-columns:92px minmax(0,1fr) 90px 70px 82px}
.sec-row{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:11px;font-weight:600;color:#888;background:#fafafa;border-bottom:1px solid #f0f0f0;text-transform:uppercase;letter-spacing:.04em}
.prog-bar{flex:1;height:3px;border-radius:2px;background:#eee;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:#3B6D11;transition:width .3s}
.prog-lbl{font-size:11px;color:#bbb;min-width:28px;text-align:right}
.chore-row{display:grid;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s;gap:8px}
.chore-row:last-of-type{border-bottom:none}
.chore-row:hover{background:#fafafa}
.chore-row.done .chore-name{text-decoration:line-through;color:#bbb}
.cb{width:18px;height:18px;border-radius:5px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
.cb.on{background:#3B6D11;border-color:#3B6D11}
.cb.on::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.chore-name{font-size:13px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:7px;white-space:nowrap}
.pj{background:#E6F1FB;color:#0C447C}
.pm{background:#FBEAF0;color:#72243E}
.pb{background:#EAF3DE;color:#27500A}
.pe{background:#F3EFFE;color:#3C3489}
.ps{background:#EAF3DE;color:#27500A}
.pp{background:#FFF3E0;color:#8B4513}
.po{background:#FCEBEB;color:#A32D2D}
.meta{font-size:12px;color:#999}
.edit-btn{width:26px;height:26px;border-radius:7px;border:1px solid #eee;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#bbb;transition:all .15s;opacity:0;flex-shrink:0}
.chore-row:hover .edit-btn{opacity:1}
.edit-btn:hover{background:#f0f0f0;color:#666}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid #f0f0f0;background:#fafafa;flex-wrap:wrap}
.add-input{flex:1;min-width:140px;border:1px solid #ddd;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.add-input:focus{border-color:#1F3864}
.add-select{border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:12px;background:#fff;color:#1a1a1a;outline:none;cursor:pointer}
.add-btn{padding:7px 14px;border-radius:8px;border:1px solid #1F3864;background:#1F3864;font-size:12px;font-weight:500;cursor:pointer;color:#fff;white-space:nowrap;transition:opacity .15s}
.add-btn:hover{opacity:.85}
.log-row{display:grid;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;gap:8px}
.log-row:last-child{border-bottom:none}
.date-lbl{font-size:12px;color:#999}
.type-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px}
.td{background:#E6F1FB;color:#0C447C}
.tw{background:#EAF3DE;color:#27500A}
.tm{background:#FAEEDA;color:#633806}
.to{background:#F3EFFE;color:#3C3489}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:360px;max-width:90vw}
.modal-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:1.25rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#1F3864}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-save{padding:8px 18px;border-radius:8px;border:none;background:#1F3864;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-cancel{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#666}
.btn-delete{padding:8px 14px;border-radius:8px;border:1px solid #ffcdd2;background:#fff;font-size:13px;cursor:pointer;color:#c62828;margin-right:auto}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1F3864;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.loading{text-align:center;padding:3rem;color:#999;font-size:14px}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:13px}
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .d-grid,.w-grid,.m-grid,.o-grid{grid-template-columns:28px minmax(0,1fr) 70px 60px}
  .col-head .meta-col,.chore-row .meta,.edit-btn{display:none}
  .l-grid{grid-template-columns:70px minmax(0,1fr) 70px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon"><i class="ti ti-home"></i></div>
      <div>
        <div class="app-title">Mason Household</div>
        <div class="app-sub">Chore tracker</div>
      </div>
    </div>
    <div class="who-toggle">
      <button class="who-btn active" onclick="setWho('All',this)">All</button>
      <button class="who-btn" onclick="setWho('Jake',this)">Jake</button>
      <button class="who-btn" onclick="setWho('Marysa',this)">Marysa</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Today's progress</div><div class="stat-val" id="s-today-pct">—</div><div class="stat-sub" id="s-today-sub"></div></div>
    <div class="stat"><div class="stat-label">Weekly progress</div><div class="stat-val" id="s-week-pct">—</div><div class="stat-sub" id="s-week-sub"></div></div>
    <div class="stat"><div class="stat-label">Jake's load</div><div class="stat-val" id="s-jake">—</div><div class="stat-sub">this week</div></div>
    <div class="stat"><div class="stat-label">Marysa's load</div><div class="stat-val" id="s-marysa">—</div><div class="stat-sub">this week</div></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('daily',this)">Daily</button>
    <button class="tab" onclick="showTab('weekly',this)">Weekly</button>
    <button class="tab" onclick="showTab('monthly',this)">Monthly</button>
    <button class="tab" onclick="showTab('occasional',this)">Occasional</button>
    <button class="tab" onclick="showTab('log',this)">History log</button>
  </div>

  <div id="tab-daily"><div class="loading">Loading...</div></div>
  <div id="tab-weekly" style="display:none"><div class="loading">Loading...</div></div>
  <div id="tab-monthly" style="display:none"><div class="loading">Loading...</div></div>
  <div id="tab-occasional" style="display:none"><div class="loading">Loading...</div></div>
  <div id="tab-log" style="display:none"><div class="loading">Loading...</div></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Edit chore</div>
    <div class="field"><label>Chore name</label><input id="m-name" type="text"></div>
    <div class="field"><label>Assigned to</label>
      <select id="m-assign"><option>Jake</option><option>Marysa</option><option>Both</option><option>Either</option></select>
    </div>
    <div id="m-streak-field" class="field"><label>Streak (days)</label><input id="m-streak" type="number" min="0"></div>
    <div id="m-day-field" class="field" style="display:none"><label>Due day</label>
      <select id="m-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
    </div>
    <div id="m-lastdone-field" class="field" style="display:none"><label>Last done</label><input id="m-lastdone" type="date"></div>
    <div id="m-interval-field" class="field" style="display:none"><label>Repeat interval</label>
      <select id="m-interval">
        <option value="60">Every 2 months</option>
        <option value="90">Every 3 months</option>
        <option value="180">Every 6 months</option>
        <option value="365">Every year</option>
        <option value="730">Every 2 years</option>
      </select>
    </div>
    <div id="m-subsection-field" class="field"><label>Sub-section</label>
      <select id="m-subsection"><option value="Morning">Morning</option><option value="Daytime">Daytime</option><option value="Evening">Evening</option></select>
    </div>
    <div class="modal-actions">
      <button class="btn-delete" id="btn-delete" onclick="deleteChore()">Delete</button>
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveChore()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL = 'https://skyjfrzjtnhlupwtsjsu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNreWpmcnpqdG5obHVwd3RzanN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDAzNTcsImV4cCI6MjA5NTgxNjM1N30.kQDBWrDug6uMWL9BJaQMN28tJvF-R_ao40BY7CsRJaA';
const HEADERS = {'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

let allChores = [];
let dailyStatus = {};
let activeChoreId = null;
let activeFreq = null;
let currentWho = 'All';
let activeTab = 'daily';
const today = new Date().toISOString().split('T')[0];

async function api(path, method='GET', body=null) {
  const opts = {method, headers:{...HEADERS, 'Prefer': method==='POST'?'return=representation':''}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SUPA_URL+'/rest/v1/'+path, opts);
  if (!r.ok) { const e = await r.text(); throw new Error(e); }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

async function loadAll() {
  try {
    const [chores, statuses, comps] = await Promise.all([
      api('chores?order=sort_order.asc,created_at.asc'),
      api('daily_status?status_date=eq.'+today),
      api('completions?order=completed_at.desc&limit=50')
    ]);
    allChores = chores || [];
    dailyStatus = {};
    (statuses||[]).forEach(s => { dailyStatus[s.chore_id] = s; });
    renderAll();
    renderLog(comps||[]);
    updateStats();
  } catch(e) { showToast('Error loading data'); console.error(e); }
}

function choresFor(freq) {
  let list = allChores.filter(c => c.frequency === freq);
  if (currentWho !== 'All') list = list.filter(c => c.assigned_to === currentWho || c.assigned_to === 'Both' || c.assigned_to === 'Either');
  return list;
}

function pillClass(a) {
  return a==='Jake'?'pj':a==='Marysa'?'pm':a==='Either'?'pe':a==='Both'?'pb':'pb';
}

function intervalLabel(days) {
  const d = parseInt(days);
  if (d <= 60) return '2 months';
  if (d <= 90) return '3 months';
  if (d <= 180) return '6 months';
  if (d <= 365) return 'Yearly';
  return '2 years';
}

function occasionalStatus(chore) {
  const done = dailyStatus[chore.id]?.done || false;
  if (done) return {label:'Done', cls:'ps'};
  if (!chore.last_done) return {label:'Not set', cls:'pp'};
  const interval = parseInt(chore.sort_order) || 180;
  const days = Math.floor((new Date() - new Date(chore.last_done)) / 86400000);
  const pct = days / interval;
  if (pct >= 1) return {label:'Overdue', cls:'po'};
  if (pct >= 0.85) return {label:'Due soon', cls:'pp'};
  return {label:'On track', cls:'ps'};
}

function renderDaily() {
  const chores = choresFor('daily');
  const sections = ['Morning','Daytime','Evening'];
  let html = '<div class="card">';
  html += '<div class="col-head d-grid"><span></span><span>Chore</span><span>Assigned</span><span class="meta-col">Streak</span><span>Status</span><span></span></div>';
  sections.forEach(sec => {
    const sc = chores.filter(c => c.sub_section === sec);
    const doneCount = sc.filter(c => dailyStatus[c.id]?.done).length;
    const pct = sc.length ? Math.round(doneCount/sc.length*100) : 0;
    const icon = sec==='Morning'?'ti-sun':sec==='Daytime'?'ti-sun-high':'ti-moon';
    html += `<div class="sec-row"><i class="ti ${icon}" style="font-size:13px"></i>${sec}<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-lbl">${doneCount}/${sc.length}</span></div>`;
    if (!sc.length) html += '<div class="empty">No chores yet</div>';
    sc.forEach(c => {
      const done = dailyStatus[c.id]?.done||false;
      html += `<div class="chore-row d-grid${done?' done':''}" onclick="toggleChore('${c.id}','daily')">
        <div class="cb${done?' on':''}"></div>
        <span class="chore-name">${esc(c.name)}</span>
        <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
        <span class="meta">${c.streak||0} days</span>
        <span class="pill ${done?'ps':'pp'}">${done?'Done':'Pending'}</span>
        <button class="edit-btn" onclick="openEdit(event,'${c.id}','daily')"><i class="ti ti-edit" style="font-size:13px"></i></button>
      </div>`;
    });
  });
  html += `<div class="add-row">
    <input class="add-input" id="add-daily-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('daily')">
    <select class="add-select" id="add-daily-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
    <select class="add-select" id="add-daily-sec"><option>Morning</option><option>Daytime</option><option>Evening</option></select>
    <button class="add-btn" onclick="addChore('daily')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-daily').innerHTML = html;
}

function renderWeekly() {
  const chores = choresFor('weekly');
  let html = '<div class="card">';
  html += '<div class="col-head w-grid"><span></span><span>Chore</span><span>Assigned</span><span class="meta-col">Due day</span><span>Status</span><span></span></div>';
  if (!chores.length) html += '<div class="empty">No weekly chores yet</div>';
  chores.forEach(c => {
    const done = dailyStatus[c.id]?.done||false;
    html += `<div class="chore-row w-grid${done?' done':''}" onclick="toggleChore('${c.id}','weekly')">
      <div class="cb${done?' on':''}"></div>
      <span class="chore-name">${esc(c.name)}</span>
      <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
      <span class="meta">${c.due_day||'—'}</span>
      <span class="pill ${done?'ps':'pp'}">${done?'Done':'Pending'}</span>
      <button class="edit-btn" onclick="openEdit(event,'${c.id}','weekly')"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>`;
  });
  html += `<div class="add-row">
    <input class="add-input" id="add-weekly-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('weekly')">
    <select class="add-select" id="add-weekly-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
    <select class="add-select" id="add-weekly-day"><option>Sunday</option><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option></select>
    <button class="add-btn" onclick="addChore('weekly')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-weekly').innerHTML = html;
}

function renderMonthly() {
  const chores = choresFor('monthly');
  let html = '<div class="card">';
  html += '<div class="col-head m-grid"><span></span><span>Chore</span><span>Assigned</span><span class="meta-col">Last done</span><span>Status</span><span></span></div>';
  if (!chores.length) html += '<div class="empty">No monthly chores yet</div>';
  chores.forEach(c => {
    const done = dailyStatus[c.id]?.done||false;
    let statusLabel, statusCls;
    if (done) { statusLabel='Done'; statusCls='ps'; }
    else if (!c.last_done) { statusLabel='Not set'; statusCls='pp'; }
    else {
      const days = Math.floor((new Date()-new Date(c.last_done))/86400000);
      if (days>35){statusLabel='Overdue';statusCls='po';}
      else if(days>25){statusLabel='Due soon';statusCls='pp';}
      else{statusLabel='On track';statusCls='ps';}
    }
    const lastDisplay = c.last_done ? new Date(c.last_done+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
    html += `<div class="chore-row m-grid${done?' done':''}" onclick="toggleChore('${c.id}','monthly')">
      <div class="cb${done?' on':''}"></div>
      <span class="chore-name">${esc(c.name)}</span>
      <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
      <span class="meta">${lastDisplay}</span>
      <span class="pill ${statusCls}">${statusLabel}</span>
      <button class="edit-btn" onclick="openEdit(event,'${c.id}','monthly')"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>`;
  });
  html += `<div class="add-row">
    <input class="add-input" id="add-monthly-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('monthly')">
    <select class="add-select" id="add-monthly-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
    <button class="add-btn" onclick="addChore('monthly')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-monthly').innerHTML = html;
}

function renderOccasional() {
  const chores = choresFor('occasional');
  let html = '<div class="card">';
  html += '<div class="col-head o-grid"><span></span><span>Chore</span><span>Assigned</span><span class="meta-col">Last done</span><span>Status</span><span></span></div>';
  if (!chores.length) html += '<div class="empty">No occasional chores yet — add things like annual smoke alarm checks or 6-month filter replacements</div>';
  chores.forEach(c => {
    const {label, cls} = occasionalStatus(c);
    const done = dailyStatus[c.id]?.done||false;
    const lastDisplay = c.last_done ? new Date(c.last_done+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    const interval = parseInt(c.sort_order)||180;
    html += `<div class="chore-row o-grid${done?' done':''}" onclick="toggleChore('${c.id}','occasional')">
      <div class="cb${done?' on':''}"></div>
      <span class="chore-name">${esc(c.name)} <span style="font-size:11px;color:#bbb">(${intervalLabel(interval)})</span></span>
      <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
      <span class="meta">${lastDisplay}</span>
      <span class="pill ${cls}">${label}</span>
      <button class="edit-btn" onclick="openEdit(event,'${c.id}','occasional')"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>`;
  });
  html += `<div class="add-row">
    <input class="add-input" id="add-occasional-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('occasional')">
    <select class="add-select" id="add-occasional-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
    <select class="add-select" id="add-occasional-interval">
      <option value="60">Every 2 months</option>
      <option value="90">Every 3 months</option>
      <option value="180" selected>Every 6 months</option>
      <option value="365">Every year</option>
      <option value="730">Every 2 years</option>
    </select>
    <button class="add-btn" onclick="addChore('occasional')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-occasional').innerHTML = html;
}

function renderLog(comps) {
  let html = '<div class="card">';
  html += '<div class="col-head l-grid"><span>Date</span><span>Chore</span><span>Assigned</span><span>Type</span><span>Completed by</span></div>';
  if (!comps.length) html += '<div class="empty">No history yet — completions will appear here</div>';
  comps.forEach(c => {
    const d = new Date(c.completed_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const tcMap = {daily:'td',weekly:'tw',monthly:'tm',occasional:'to'};
    const tc = tcMap[c.frequency]||'td';
    const tl = c.frequency ? c.frequency.charAt(0).toUpperCase()+c.frequency.slice(1) : '—';
    html += `<div class="log-row l-grid">
      <span class="date-lbl">${d}</span>
      <span class="chore-name">${esc(c.chore_name||'')}</span>
      <span class="pill ${pillClass(c.assigned_to||'Both')}">${c.assigned_to||'—'}</span>
      <span><span class="type-badge ${tc}">${tl}</span></span>
      <span class="pill ${pillClass(c.completed_by||'Both')}">${c.completed_by||'—'}</span>
    </div>`;
  });
  html += '</div>';
  document.getElementById('tab-log').innerHTML = html;
}

function renderAll() {
  renderDaily();
  renderWeekly();
  renderMonthly();
  renderOccasional();
}

function updateStats() {
  const daily = allChores.filter(c=>c.frequency==='daily');
  const doneDaily = daily.filter(c=>dailyStatus[c.id]?.done).length;
  const pctD = daily.length ? Math.round(doneDaily/daily.length*100) : 0;
  document.getElementById('s-today-pct').textContent = pctD+'%';
  document.getElementById('s-today-sub').textContent = doneDaily+' of '+daily.length+' done';

  const weekly = allChores.filter(c=>c.frequency==='weekly');
  const doneWeekly = weekly.filter(c=>dailyStatus[c.id]?.done).length;
  const pctW = weekly.length ? Math.round(doneWeekly/weekly.length*100) : 0;
  document.getElementById('s-week-pct').textContent = pctW+'%';
  document.getElementById('s-week-sub').textContent = doneWeekly+' of '+weekly.length+' done';

  const allDone = allChores.filter(c=>dailyStatus[c.id]?.done);
  const jDone = allDone.filter(c=>c.assigned_to==='Jake').length + allDone.filter(c=>c.assigned_to==='Both').length*0.5;
  const mDone = allDone.filter(c=>c.assigned_to==='Marysa').length + allDone.filter(c=>c.assigned_to==='Both').length*0.5;
  const total = jDone+mDone;
  document.getElementById('s-jake').textContent = total ? Math.round(jDone/total*100)+'%' : '—';
  document.getElementById('s-marysa').textContent = total ? Math.round(mDone/total*100)+'%' : '—';
}

async function toggleChore(id, freq) {
  const current = dailyStatus[id]?.done||false;
  const newVal = !current;
  try {
    if (dailyStatus[id]) {
      await api('daily_status?chore_id=eq.'+id+'&status_date=eq.'+today,'PATCH',{done:newVal});
    } else {
      await api('daily_status','POST',{chore_id:id,status_date:today,done:newVal});
    }
    const chore = allChores.find(c=>c.id===id);
    if (newVal && chore) {
      const updates = {};
      if (freq==='daily') updates.streak = (chore.streak||0)+1;
      if (freq==='monthly'||freq==='occasional') updates.last_done = today;
      if (Object.keys(updates).length) {
        await api('chores?id=eq.'+id,'PATCH',updates);
        Object.assign(chore, updates);
      }
      await api('completions','POST',{chore_id:id,chore_name:chore.name,assigned_to:chore.assigned_to,frequency:freq,completed_by:currentWho==='All'?chore.assigned_to:currentWho});
    }
    dailyStatus[id] = {done:newVal};
    if (freq==='daily') renderDaily();
    else if (freq==='weekly') renderWeekly();
    else if (freq==='monthly') renderMonthly();
    else if (freq==='occasional') renderOccasional();
    updateStats();
  } catch(e) { showToast('Error saving'); console.error(e); }
}

async function addChore(freq) {
  const nameEl = document.getElementById('add-'+freq+'-name');
  const assignEl = document.getElementById('add-'+freq+'-assign');
  const name = nameEl.value.trim();
  if (!name) return;
  const extras = {};
  if (freq==='daily') extras.sub_section = document.getElementById('add-daily-sec').value;
  if (freq==='weekly') extras.due_day = document.getElementById('add-weekly-day').value;
  if (freq==='occasional') extras.sort_order = parseInt(document.getElementById('add-occasional-interval').value)||180;
  try {
    const [created] = await api('chores','POST',{name,assigned_to:assignEl.value,frequency:freq,...extras});
    allChores.push(created);
    nameEl.value = '';
    if (freq==='daily') renderDaily();
    else if (freq==='weekly') renderWeekly();
    else if (freq==='monthly') renderMonthly();
    else if (freq==='occasional') renderOccasional();
    updateStats();
    showToast('Chore added');
  } catch(e) { showToast('Error adding chore'); console.error(e); }
}

function openEdit(e, id, freq) {
  e.stopPropagation();
  activeChoreId = id; activeFreq = freq;
  const chore = allChores.find(c=>c.id===id);
  if (!chore) return;
  document.getElementById('m-name').value = chore.name;
  document.getElementById('m-assign').value = chore.assigned_to;
  document.getElementById('m-streak').value = chore.streak||0;
  document.getElementById('m-streak-field').style.display = freq==='daily'?'':'none';
  document.getElementById('m-day-field').style.display = freq==='weekly'?'':'none';
  document.getElementById('m-lastdone-field').style.display = (freq==='monthly'||freq==='occasional')?'':'none';
  document.getElementById('m-interval-field').style.display = freq==='occasional'?'':'none';
  document.getElementById('m-subsection-field').style.display = freq==='daily'?'':'none';
  if (freq==='weekly'&&chore.due_day) document.getElementById('m-day').value = chore.due_day;
  if ((freq==='monthly'||freq==='occasional')&&chore.last_done) document.getElementById('m-lastdone').value = chore.last_done;
  if (freq==='occasional') document.getElementById('m-interval').value = chore.sort_order||180;
  if (freq==='daily'&&chore.sub_section) document.getElementById('m-subsection').value = chore.sub_section;
  document.getElementById('modal').classList.add('open');
}

async function saveChore() {
  if (!activeChoreId) return;
  const updates = {name:document.getElementById('m-name').value.trim(), assigned_to:document.getElementById('m-assign').value};
  if (activeFreq==='daily') { updates.streak=parseInt(document.getElementById('m-streak').value)||0; updates.sub_section=document.getElementById('m-subsection').value; }
  if (activeFreq==='weekly') updates.due_day = document.getElementById('m-day').value;
  if (activeFreq==='monthly') updates.last_done = document.getElementById('m-lastdone').value||null;
  if (activeFreq==='occasional') { updates.last_done=document.getElementById('m-lastdone').value||null; updates.sort_order=parseInt(document.getElementById('m-interval').value)||180; }
  try {
    await api('chores?id=eq.'+activeChoreId,'PATCH',updates);
    const idx = allChores.findIndex(c=>c.id===activeChoreId);
    if (idx>=0) allChores[idx] = {...allChores[idx],...updates};
    closeModal(); renderAll(); showToast('Saved');
  } catch(e) { showToast('Error saving'); console.error(e); }
}

async function deleteChore() {
  if (!activeChoreId) return;
  if (!confirm('Delete this chore?')) return;
  try {
    await api('chores?id=eq.'+activeChoreId,'DELETE');
    allChores = allChores.filter(c=>c.id!==activeChoreId);
    closeModal(); renderAll(); updateStats(); showToast('Deleted');
  } catch(e) { showToast('Error deleting'); console.error(e); }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  activeChoreId = null; activeFreq = null;
}

function showTab(name, btn) {
  ['daily','weekly','monthly','occasional','log'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTab = name;
  if (name==='log') reloadLog();
}

async function reloadLog() {
  try {
    const comps = await api('completions?order=completed_at.desc&limit=50');
    renderLog(comps||[]);
  } catch(e) {}
}

function setWho(who, btn) {
  currentWho = who;
  document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target===this) closeModal();
});

loadAll();
</script>
</body>
</html>
