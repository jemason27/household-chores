<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mason Chores</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%23E8620A' rx='40'/%3E%3Cpath d='M90 35 L148 82 L148 152 L110 152 L110 114 L70 114 L70 152 L32 152 L32 82 Z' fill='white'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;transition:background .5s,color .5s}
body.dark{background:#1a1a1a;color:#f0f0f0}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:780px;margin:0 auto}
.header{flex-shrink:0;background:#f5f5f5;padding:1rem 1rem 0;z-index:10;transition:background .5s}
body.dark .header{background:#1a1a1a}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.logo-icon{width:36px;height:36px;border-radius:9px;background:#E8620A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;transition:opacity .15s}
.logo:active .logo-icon{opacity:.7}
.app-title{font-size:16px;font-weight:600;color:#1a1a1a;transition:color .5s}
body.dark .app-title{color:#f0f0f0}
.app-date{font-size:11px;color:#E8620A;font-weight:500;margin-top:1px}
.who-toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff;transition:background .5s,border-color .5s}
body.dark .who-toggle{background:#2a2a2a;border-color:#444}
.who-btn{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:none;color:#666;transition:all .15s}
body.dark .who-btn{color:#aaa}
.who-btn.active{background:#E8620A;color:#fff}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #eee;transition:background .5s,border-color .5s}
body.dark .stat{background:#2a2a2a;border-color:#3a3a3a}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;color:#1a1a1a;line-height:1;transition:color .5s}
body.dark .stat-val{color:#f0f0f0}
.stat-sub{font-size:11px;color:#aaa;margin-top:3px}
.stat-pts{background:#FFF8EE;border-color:#FDECC8}
body.dark .stat-pts{background:#2a2010;border-color:#4a3a10}
.stat-pts .stat-label{color:#854F0B}
.stat-pts .stat-val{color:#854F0B;font-size:18px}
body.dark .stat-pts .stat-val{color:#FAC775}
body.dark .stat-pts .stat-label{color:#FAC775}
.tabs{display:flex;gap:4px;margin-bottom:.75rem}
.tab{flex:1;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .15s;text-align:center;white-space:nowrap}
body.dark .tab{background:#2a2a2a;border-color:#444;color:#aaa}
.tab.active{background:#E8620A;color:#fff;border-color:#E8620A}
.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:.75rem}
.day-btn{padding:6px 2px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:center;transition:all .15s}
body.dark .day-btn{background:#2a2a2a;border-color:#444}
.day-btn.active{background:#E8620A;color:#fff;border-color:#E8620A}
.day-btn.is-today{border-color:#E8620A}
.day-name{font-size:9px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:.04em}
.day-btn.active .day-name{color:#fff}
.day-btn.is-today:not(.active) .day-name{color:#E8620A}
.day-num{font-size:14px;font-weight:500;color:#1a1a1a;margin:2px 0}
body.dark .day-num{color:#f0f0f0}
.day-btn.active .day-num{color:#fff}
.day-dot-wrap{display:flex;justify-content:center;gap:2px;height:6px;align-items:center}
.day-dot{width:5px;height:5px;border-radius:50%;background:#eee}
body.dark .day-dot{background:#3a3a3a}
.day-dot.full{background:#3B6D11}
.day-dot.partial{background:#E8620A}
.day-btn.active .day-dot{background:rgba(255,255,255,.5)}
.day-btn.active .day-dot.full{background:#fff}
.day-btn.active .day-dot.partial{background:rgba(255,255,255,.7)}
.viewing-banner{font-size:11px;color:#888;text-align:center;padding:5px 16px;background:#FFF8EE;border-bottom:1px solid #FDECC8;display:none}
body.dark .viewing-banner{background:#2a1e00;border-color:#4a3a10;color:#FAC775}
.viewing-banner.show{display:block}
.content{flex:1;overflow-y:auto;padding:0 1rem 1.5rem;-webkit-overflow-scrolling:touch}
.card{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:1rem;transition:background .5s,border-color .5s}
body.dark .card{background:#242424;border-color:#3a3a3a}
.tab-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0f0f0;background:#fafafa;transition:background .5s,border-color .5s}
body.dark .tab-toolbar{background:#2a2a2a;border-color:#3a3a3a}
.tab-toolbar-label{font-size:12px;color:#888}
.reset-btn{padding:5px 12px;border-radius:7px;border:1px solid #ffcdd2;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#c62828;display:flex;align-items:center;gap:5px;transition:background .5s}
body.dark .reset-btn{background:#2a2a2a;border-color:#6a2a2a}
.col-head{display:grid;align-items:center;padding:8px 16px;font-size:11px;font-weight:600;color:#999;background:#fafafa;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.04em;gap:8px;transition:background .5s,border-color .5s}
body.dark .col-head{background:#2a2a2a;border-color:#3a3a3a;color:#666}
.d-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 62px 26px}
.w-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 62px 26px}
.m-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 74px 26px}
.o-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 74px 26px}
.l-grid{grid-template-columns:80px minmax(0,1fr) 72px 44px 44px}
.sec-row{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:11px;font-weight:600;color:#888;background:#fafafa;border-bottom:1px solid #f0f0f0;text-transform:uppercase;letter-spacing:.04em;transition:background .5s,border-color .5s}
body.dark .sec-row{background:#2a2a2a;border-color:#3a3a3a}
.prog-bar{flex:1;height:3px;border-radius:2px;background:#eee;overflow:hidden}
body.dark .prog-bar{background:#3a3a3a}
.prog-fill{height:100%;border-radius:2px;background:#E8620A;transition:width .3s}
.prog-lbl{font-size:11px;color:#bbb;min-width:28px;text-align:right}
.chore-row{display:grid;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s;gap:8px}
body.dark .chore-row{border-color:#3a3a3a}
.chore-row:last-of-type{border-bottom:none}
.chore-row:hover{background:#fafafa}
body.dark .chore-row:hover{background:#2a2a2a}
.chore-row.done .chore-name{text-decoration:line-through;color:#bbb}
.chore-row.done .chore-meta-line{opacity:.4}
.chore-row.readonly{cursor:default;opacity:.85}
.cb{width:18px;height:18px;border-radius:5px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
body.dark .cb{background:#2a2a2a;border-color:#555}
.cb.on{background:#E8620A;border-color:#E8620A}
.cb.on::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.chore-cell{display:flex;flex-direction:column;gap:2px;min-width:0}
.chore-name{font-size:13px;color:#1a1a1a;line-height:1.3;word-break:break-word;transition:color .5s}
body.dark .chore-name{color:#e0e0e0}
.chore-meta-line{font-size:11px;color:#aaa;display:none;align-items:center;gap:6px;flex-wrap:wrap}
.chore-meta-line .meta-tag{background:#f5f5f5;padding:1px 6px;border-radius:4px;font-size:11px;color:#888;transition:background .5s}
body.dark .chore-meta-line .meta-tag{background:#333;color:#999}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:7px;white-space:nowrap}
.pj{background:#E6F1FB;color:#0C447C}
.pm{background:#FBEAF0;color:#72243E}
.pb{background:#EAF3DE;color:#27500A}
.pe{background:#F3EFFE;color:#3C3489}
.ps{background:#EAF3DE;color:#27500A}
.pp{background:#FFF3E0;color:#8B4513}
.po{background:#FCEBEB;color:#A32D2D}
body.dark .pj{background:#0C2A4A;color:#85B7EB}
body.dark .pm{background:#3a1020;color:#ED93B1}
body.dark .pb{background:#1a2e0a;color:#97C459}
body.dark .pe{background:#1e1040;color:#AFA9EC}
body.dark .ps{background:#1a2e0a;color:#97C459}
body.dark .pp{background:#2a1e00;color:#EF9F27}
body.dark .po{background:#2a0a0a;color:#F09595}
.pts-badge{font-size:10px;font-weight:600;color:#854F0B;background:#FAEEDA;padding:2px 7px;border-radius:5px;white-space:nowrap;text-align:center}
.pts-badge.earned{background:#EAF3DE;color:#27500A}
.pts-badge.spent{background:#FCEBEB;color:#A32D2D}
body.dark .pts-badge{background:#2a1e00;color:#EF9F27}
body.dark .pts-badge.earned{background:#1a2e0a;color:#97C459}
body.dark .pts-badge.spent{background:#2a0a0a;color:#F09595}
.edit-btn{width:26px;height:26px;border-radius:7px;border:1px solid #eee;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#bbb;transition:all .15s;opacity:0;flex-shrink:0}
body.dark .edit-btn{border-color:#3a3a3a;color:#666}
.chore-row:hover .edit-btn{opacity:1}
.edit-btn:hover{background:#f0f0f0;color:#666}
body.dark .edit-btn:hover{background:#333}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid #f0f0f0;background:#fafafa;flex-wrap:wrap;transition:background .5s,border-color .5s}
body.dark .add-row{background:#2a2a2a;border-color:#3a3a3a}
.add-input{flex:1;min-width:120px;border:1px solid #ddd;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;transition:background .5s,border-color .5s,color .5s}
body.dark .add-input{background:#333;border-color:#555;color:#e0e0e0}
.add-input:focus{border-color:#E8620A}
.add-select{border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:12px;background:#fff;color:#1a1a1a;outline:none;cursor:pointer;transition:background .5s,border-color .5s,color .5s}
body.dark .add-select{background:#333;border-color:#555;color:#e0e0e0}
.add-btn{padding:7px 14px;border-radius:8px;border:1px solid #E8620A;background:#E8620A;font-size:12px;font-weight:500;cursor:pointer;color:#fff;white-space:nowrap}
.add-btn:hover{opacity:.85}
.log-row{display:grid;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;gap:8px;transition:border-color .5s}
body.dark .log-row{border-color:#3a3a3a}
.log-row:last-child{border-bottom:none}
.date-lbl{font-size:12px;color:#999}
.type-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px}
.td{background:#E6F1FB;color:#0C447C}
.tw{background:#EAF3DE;color:#27500A}
.tm{background:#FAEEDA;color:#633806}
.to{background:#F3EFFE;color:#3C3489}
body.dark .td{background:#0C2A4A;color:#85B7EB}
body.dark .tw{background:#1a2e0a;color:#97C459}
body.dark .tm{background:#2a1e00;color:#EF9F27}
body.dark .to{background:#1e1040;color:#AFA9EC}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:360px;max-width:90vw;max-height:90vh;overflow-y:auto;transition:background .5s}
body.dark .modal{background:#242424}
.modal-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:1.25rem;transition:color .5s}
body.dark .modal-title{color:#f0f0f0}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;transition:background .5s,border-color .5s,color .5s}
body.dark .field input,body.dark .field select{background:#333;border-color:#555;color:#e0e0e0}
.field input:focus,.field select:focus{border-color:#E8620A}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-save{padding:8px 18px;border-radius:8px;border:none;background:#E8620A;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-cancel{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#666;transition:background .5s,border-color .5s,color .5s}
body.dark .btn-cancel{background:#333;border-color:#555;color:#aaa}
.btn-delete{padding:8px 14px;border-radius:8px;border:1px solid #ffcdd2;background:#fff;font-size:13px;cursor:pointer;color:#c62828;margin-right:auto;transition:background .5s}
body.dark .btn-delete{background:#2a0a0a;border-color:#6a2a2a}
.who-modal-btns{display:flex;gap:10px;margin-top:.5rem}
.who-modal-btn{flex:1;padding:10px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:center;font-size:13px;font-weight:500;color:#1a1a1a;transition:all .15s}
body.dark .who-modal-btn{background:#333;border-color:#555;color:#e0e0e0}
.who-modal-btn:hover{border-color:#E8620A}
.who-modal-btn.selected{border:2px solid #E8620A;background:#FFF8EE;color:#E8620A}
body.dark .who-modal-btn.selected{background:#2a1e00}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#E8620A;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:3rem;color:#999;font-size:14px}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:13px}
.rewards-setup{padding:1rem;border-bottom:1px solid #f0f0f0;background:#fafafa;transition:background .5s,border-color .5s}
body.dark .rewards-setup{background:#2a2a2a;border-color:#3a3a3a}
.rewards-setup-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px;transition:color .5s}
body.dark .rewards-setup-title{color:#f0f0f0}
.rewards-setup-sub{font-size:12px;color:#888;margin-bottom:12px}
.setup-btns{display:flex;gap:10px}
.setup-btn{flex:1;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:center;transition:all .15s}
body.dark .setup-btn{background:#333;border-color:#555}
.setup-btn:hover{border-color:#E8620A}
.setup-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin:0 auto 6px}
.av-j{background:#E6F1FB;color:#0C447C}
.av-m{background:#FBEAF0;color:#72243E}
.setup-name{font-size:13px;font-weight:600;color:#1a1a1a;transition:color .5s}
body.dark .setup-name{color:#f0f0f0}
.setup-role{font-size:11px;color:#888;margin-top:2px}
.rewards-balances{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #f0f0f0;transition:border-color .5s}
body.dark .rewards-balances{border-color:#3a3a3a}
.balance-card{padding:14px 16px;transition:background .5s}
.balance-card:first-child{border-right:1px solid #f0f0f0}
body.dark .balance-card:first-child{border-color:#3a3a3a}
.balance-name{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.balance-val{font-size:22px;font-weight:600;color:#854F0B;transition:color .5s}
body.dark .balance-val{color:#FAC775}
.balance-week{font-size:11px;color:#aaa;margin-top:2px}
.balance-you{background:#FFF8EE}
body.dark .balance-you{background:#2a1e00}
.reward-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f5f5f5;transition:border-color .5s}
body.dark .reward-row{border-color:#3a3a3a}
.reward-row:last-of-type{border-bottom:none}
.reward-name{font-size:13px;font-weight:500;color:#1a1a1a;transition:color .5s}
body.dark .reward-name{color:#e0e0e0}
.reward-cost{font-size:11px;color:#888;margin-top:2px}
.redeem-btn{padding:6px 14px;border-radius:8px;border:none;background:#E8620A;color:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.redeem-btn:hover{opacity:.85}
.redeem-btn:disabled{background:#eee;color:#bbb;cursor:not-allowed;opacity:1}
body.dark .redeem-btn:disabled{background:#333;color:#666}
.rewards-reset-row{padding:12px 16px;border-top:1px solid #f0f0f0;text-align:center;transition:border-color .5s}
body.dark .rewards-reset-row{border-color:#3a3a3a}
.rewards-reset-link{font-size:12px;color:#bbb;cursor:pointer;text-decoration:underline}
.redemption-log-section{border-top:1px solid #f0f0f0;transition:border-color .5s}
body.dark .redemption-log-section{border-color:#3a3a3a}
.redemption-log-title{padding:10px 16px 6px;font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.04em}
.redemption-log-row{display:grid;grid-template-columns:76px minmax(0,1fr) 70px;gap:8px;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;transition:border-color .5s}
body.dark .redemption-log-row{border-color:#3a3a3a}
.redemption-log-row:last-child{border-bottom:none}
.confetti-wrap{position:relative;height:0;overflow:visible;pointer-events:none;z-index:50}
.cp{position:absolute;width:8px;height:8px;border-radius:2px;animation:cfal 1.3s ease-out forwards}
@keyframes cfal{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(130px) rotate(720deg);opacity:0}}
@media(max-width:600px){
  .header{padding:.75rem .75rem 0}
  .stats{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat{padding:10px 8px}
  .stat-val{font-size:17px}
  .stat-pts .stat-val{font-size:15px}
  .stat-label{font-size:10px}
  .stat-sub{font-size:10px}
  .tab{font-size:10px;padding:5px 1px}
  .day-btn{padding:5px 1px}
  .day-num{font-size:13px}
  .content{padding:0 .75rem 1.5rem}
  .d-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 58px 26px}
  .w-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 58px 26px}
  .m-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 66px 26px}
  .o-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 66px 26px}

<script>
const SUPA_URL='https://skyjfrzjtnhlupwtsjsu.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNreWpmcnpqdG5obHVwd3RzanN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDAzNTcsImV4cCI6MjA5NTgxNjM1N30.kQDBWrDug6uMWL9BJaQMN28tJvF-R_ao40BY7CsRJaA';
const HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const FREQ_PTS={daily:1,weekly:3,monthly:5,occasional:10};
const REWARDS=['You pick date night','Partner picks date night','No-veto movie night','Massage','Partner does your weekly chores','No-veto week of meals','You pick the sex','$25 shopping spree','Sweet Treat Date'];
const REWARD_COST=50;
const ASSIGN_ORDER={'Jake':0,'Marysa':1,'Either':2,'Both':3};
const DAY_NAMES=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const SECTIONS=[
  {key:'Morning', icon:'ti-sun'},
  {key:'Midday',  icon:'ti-sun-high'},
  {key:'Evening', icon:'ti-moon'}
];

let allChores=[],dailyStatusMap={},activeChoreId=null,activeFreq=null;
let currentWho='All',activeTab='daily';
let currentPerson=localStorage.getItem('mason_person')||null;
let jakePoints=0,marysaPoints=0,jakeWeekPts=0,marysaWeekPts=0;
let allRedemptions=[];

const todayDate=new Date();
const todayStr=todayDate.toISOString().split('T')[0];
let selectedDateStr=todayStr;

let pendingToggleId=null,pendingToggleFreq=null,pendingToggleDateStr=null;
let whoModalSelected=null;

function dateToStr(d){return d.toISOString().split('T')[0];}

function getWeekDates(){
  const dates=[];
  const d=new Date(todayDate);
  d.setDate(d.getDate()-d.getDay());
  for(let i=0;i<7;i++){
    const day=new Date(d);
    day.setDate(d.getDate()+i);
    dates.push(day);
  }
  return dates;
}

function getDailyStatusKey(choreId,dateStr){return choreId+'|'+dateStr;}

function normalizeSubsection(s){
  if(!s) return 'Morning';
  if(s==='AM'||s==='Morning'||s==='Daytime') return 'Morning';
  if(s==='Midday') return 'Midday';
  if(s==='PM'||s==='Evening') return 'Evening';
  return 'Morning';
}

function isDueOnDate(chore,dateStr){
  if(chore.frequency!=='daily') return false;
  const interval=chore.daily_interval||1;
  if(interval===1) return true;
  const ref=new Date(chore.last_done||chore.created_at||todayStr);
  const target=new Date(dateStr);
  const diffDays=Math.round((target-ref)/86400000);
  return diffDays%interval===0;
}

const PHOENIX_LAT=33.4484,PHOENIX_LNG=-112.0740;
function getSunTimes(date){
  const rad=Math.PI/180;
  const d=date||new Date();
  const jd=Math.floor(d/86400000)+2440587.5;
  const n=Math.round(jd-2451545.0-0.0009+PHOENIX_LNG/360);
  const Js=2451545.0+0.0009-PHOENIX_LNG/360+n;
  const M=(357.5291+0.98560028*(Js-2451545))*rad;
  const C=(1.9148*Math.sin(M)+0.0200*Math.sin(2*M)+0.0003*Math.sin(3*M))*rad;
  const lam=((280.4665+0.98564736*(Js-2451545)+C/rad+180)%360)*rad;
  const dec=Math.asin(Math.sin(-23.4397*rad)*Math.cos(lam));
  const cosH=(Math.sin(-0.833*rad)-Math.sin(PHOENIX_LAT*rad)*Math.sin(dec))/(Math.cos(PHOENIX_LAT*rad)*Math.cos(dec));
  if(cosH<-1||cosH>1) return null;
  const H=Math.acos(cosH)/rad;
  const transit=(Js+0.0053*Math.sin(M)-0.0069*Math.sin(2*lam))-PHOENIX_LNG/360;
  const base=new Date(d);base.setHours(0,0,0,0);
  return{
    sunrise:new Date(base.getTime()+((transit-H/360)%1)*86400000),
    sunset:new Date(base.getTime()+((transit+H/360)%1)*86400000)
  };
}

function applyDarkMode(){
  if(currentPerson==='Marysa'){document.body.classList.remove('dark');return;}
  const now=new Date();
  const times=getSunTimes(now);
  if(!times){document.body.classList.remove('dark');return;}
  document.body.classList.toggle('dark',now>=times.sunset||now<times.sunrise);
}

async function api(path,method='GET',body=null){
  const opts={method,headers:{...HEADERS,'Prefer':method==='POST'?'return=representation':''}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){
  try{
    const weekDates=getWeekDates();
    const weekStart=dateToStr(weekDates[0]);
    const weekEnd=dateToStr(weekDates[6]);
    const [chores,statuses,comps,pts,redemptions]=await Promise.all([
      api('chores?order=sort_order.asc,created_at.asc'),
      api('daily_status?status_date=gte.'+weekStart+'&status_date=lte.'+weekEnd),
      api('completions?order=completed_at.desc&limit=80'),
      api('points?order=created_at.desc'),
      api('redemptions?order=created_at.desc')
    ]);
    allChores=(chores||[]).map(c=>{
      if(c.frequency==='daily'){
        return{...c,sub_section:normalizeSubsection(c.sub_section)};
      }
      return c;
    });
    dailyStatusMap={};
    (statuses||[]).forEach(s=>{
      const key=getDailyStatusKey(s.chore_id,s.status_date);
      dailyStatusMap[key]=s;
    });
    allRedemptions=redemptions||[];
    calcPoints(pts||[],redemptions||[]);
    applyPersonDefaults();
    applyDarkMode();
    setAppDate();
    updatePtsDisplay();
    buildDayStrip();
    renderAll();
    renderRewards();
    renderActivity(comps||[],redemptions||[]);
    updateStats();
  }catch(e){showToast('Error loading data');console.error(e);}
}

function setAppDate(){
  const d=new Date();
  document.getElementById('app-date').textContent=d.toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'});
}

function buildDayStrip(){
  const strip=document.getElementById('day-strip');
  strip.innerHTML='';
  getWeekDates().forEach((d)=>{
    const dStr=dateToStr(d);
    const isToday=dStr===todayStr;
    const isSelected=dStr===selectedDateStr;
    const isFuture=d>todayDate&&!isToday;
    const dailyChores=allChores.filter(c=>c.frequency==='daily'&&isDueOnDate(c,dStr));
    const doneCount=dailyChores.filter(c=>dailyStatusMap[getDailyStatusKey(c.id,dStr)]?.done).length;
    const total=dailyChores.length;
    let dotCls='';
    if(!isFuture&&total>0){
      if(doneCount===total) dotCls='full';
      else if(doneCount>0) dotCls='partial';
    }
    const btn=document.createElement('div');
    btn.className='day-btn'+(isSelected?' active':'')+(isToday&&!isSelected?' is-today':'');
    btn.innerHTML=`<div class="day-name">${DAY_NAMES[d.getDay()]}</div><div class="day-num">${d.getDate()}</div><div class="day-dot-wrap"><div class="day-dot${dotCls?' '+dotCls:''}"></div></div>`;
    btn.onclick=()=>selectDay(dStr);
    strip.appendChild(btn);
  });
}

function selectDay(dStr){
  selectedDateStr=dStr;
  buildDayStrip();
  const banner=document.getElementById('viewing-banner');
  if(dStr===todayStr){
    banner.classList.remove('show');
    banner.textContent='';
  }else{
    const d=new Date(dStr+'T12:00:00');
    const label=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    const isFuture=new Date(dStr)>todayDate;
    banner.textContent=isFuture?'Viewing '+label+' — future day':'Viewing '+label+' — read only';
    banner.classList.add('show');
  }
  renderDaily();
  updateStats();
}

function applyPersonDefaults(){
  if(currentPerson==='Jake'){
    currentWho='Jake';
    document.getElementById('who-jake').classList.add('active');
    document.getElementById('who-all').classList.remove('active');
    document.getElementById('who-marysa').classList.remove('active');
  }else if(currentPerson==='Marysa'){
    currentWho='Marysa';
    document.getElementById('who-marysa').classList.add('active');
    document.getElementById('who-all').classList.remove('active');
    document.getElementById('who-jake').classList.remove('active');
  }else{
    currentWho='All';
    document.getElementById('who-all').classList.add('active');
    document.getElementById('who-jake').classList.remove('active');
    document.getElementById('who-marysa').classList.remove('active');
  }
}

function calcPoints(pts,redemptions){
  jakePoints=0;marysaPoints=0;jakeWeekPts=0;marysaWeekPts=0;
  const weekMs=7*86400000;
  pts.forEach(p=>{
    if(p.person==='Jake'){jakePoints+=p.amount;if(new Date()-new Date(p.created_at)<weekMs)jakeWeekPts+=p.amount;}
    else{marysaPoints+=p.amount;if(new Date()-new Date(p.created_at)<weekMs)marysaWeekPts+=p.amount;}
  });
  redemptions.forEach(r=>{
    if(r.person==='Jake') jakePoints-=r.points_spent;
    else marysaPoints-=r.points_spent;
  });
  jakePoints=Math.max(0,jakePoints);
  marysaPoints=Math.max(0,marysaPoints);
}

function updatePtsDisplay(){
  const myPts=currentPerson==='Jake'?jakePoints:currentPerson==='Marysa'?marysaPoints:null;
  document.getElementById('pts-label').textContent=currentPerson?currentPerson+"'s pts":'Your pts';
  document.getElementById('s-pts').textContent=myPts!==null?myPts:'—';
}

function sortChores(chores,isDone){
  return chores.slice().sort((a,b)=>{
    const aDone=isDone(a)?1:0,bDone=isDone(b)?1:0;
    if(aDone!==bDone) return aDone-bDone;
    return (ASSIGN_ORDER[a.assigned_to]??4)-(ASSIGN_ORDER[b.assigned_to]??4);
  });
}

function choresFor(freq){
  let list=allChores.filter(c=>c.frequency===freq);
  if(currentWho!=='All') list=list.filter(c=>c.assigned_to===currentWho||c.assigned_to==='Both'||c.assigned_to==='Either');
  return list;
}

function pillClass(a){return a==='Jake'?'pj':a==='Marysa'?'pm':a==='Either'?'pe':'pb';}

function ptsBadge(freq,done){
  const n=FREQ_PTS[freq]||1;
  const label=n===1?'+1 pt':'+'+n+' pts';
  return `<span class="pts-badge" style="${done?'':'opacity:.35;'}">${label}</span>`;
}

function intervalLabel(days){
  const d=parseInt(days);
  if(d<=60) return '2 mo';if(d<=90) return '3 mo';if(d<=180) return '6 mo';
  if(d<=365) return 'Yearly';return '2 yr';
}

function occasionalStatus(chore){
  const done=dailyStatusMap[getDailyStatusKey(chore.id,todayStr)]?.done||false;
  if(done) return{label:'Done',cls:'ps'};
  if(!chore.last_done) return{label:'Not set',cls:'pp'};
  const interval=parseInt(chore.sort_order)||180;
  const days=Math.floor((new Date()-new Date(chore.last_done))/86400000);
  const pct=days/interval;
  if(pct>=1) return{label:'Overdue',cls:'po'};
  if(pct>=0.85) return{label:'Due soon',cls:'pp'};
  return{label:'On track',cls:'ps'};
}

function toolbarHTML(label,resetFn){
  return `<div class="tab-toolbar"><span class="tab-toolbar-label">${label}</span><button class="reset-btn" onclick="${resetFn}"><i class="ti ti-refresh" style="font-size:13px"></i> Reset</button></div>`;
}

function renderDaily(){
  const isToday=selectedDateStr===todayStr;
  const isFuture=new Date(selectedDateStr)>todayDate&&!isToday;
  const readonly=!isToday;
  let chores=choresFor('daily').filter(c=>isDueOnDate(c,selectedDateStr));
  let html='<div class="card">';

  SECTIONS.forEach(({key,icon})=>{
    let sc=chores.filter(c=>normalizeSubsection(c.sub_section)===key);
    sc=sortChores(sc,c=>dailyStatusMap[getDailyStatusKey(c.id,selectedDateStr)]?.done||false);
    const doneCount=sc.filter(c=>dailyStatusMap[getDailyStatusKey(c.id,selectedDateStr)]?.done).length;
    const pct=sc.length?Math.round(doneCount/sc.length*100):0;
    html+=`<div class="sec-row"><i class="ti ${icon}" style="font-size:13px"></i>${key}<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div><span class="prog-lbl">${doneCount}/${sc.length}</span></div>`;
    if(!sc.length) html+='<div class="empty">No chores yet</div>';
    sc.forEach(c=>{
      const key2=getDailyStatusKey(c.id,selectedDateStr);
      const done=dailyStatusMap[key2]?.done||false;
      const clickHandler=readonly?'':`onclick="toggleChore('${c.id}','daily','${selectedDateStr}')"`;
      html+=`<div class="chore-row d-grid${done?' done':''}${readonly?' readonly':''}" ${clickHandler}>
        <div class="cb${done?' on':''}"></div>
        <div class="chore-cell">
          <span class="chore-name">${esc(c.name)}</span>
          <div class="chore-meta-line"><span class="meta-tag">${c.streak||0} day streak</span>${(c.daily_interval||1)>1?`<span class="meta-tag">Every ${c.daily_interval} days</span>`:''}</div>
        </div>
        <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
        <span class="desktop-meta" style="font-size:12px;color:#999">${c.streak||0} days</span>
        ${ptsBadge('daily',done)}
        <span class="pill ${done?'ps':'pp'}">${done?'Done':'Pending'}</span>
        <button class="edit-btn" onclick="openEdit(event,'${c.id}','daily')"><i class="ti ti-edit" style="font-size:13px"></i></button>
      </div>`;
    });
  });
  if(isToday){
    html+=`<div class="add-row">
      <input class="add-input" id="add-daily-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('daily')">
      <select class="add-select" id="add-daily-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
      <select class="add-select" id="add-daily-sec"><option>Morning</option><option>Midday</option><option>Evening</option></select>
      <button class="add-btn" onclick="addChore('daily')"><i class="ti ti-plus"></i> Add</button>
    </div>`;
  }
  html+='</div>';
  document.getElementById('tab-daily').innerHTML=html;
}

function renderWeekly(){
  const chores=sortChores(choresFor('weekly'),c=>dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done||false);
  let html='<div class="card">';
  html+=toolbarHTML('Reset clears all weekly checkboxes — tap every Sunday','resetWeekly()');
  html+='<div class="col-head w-grid"><span></span><span>Chore</span><span>Assigned</span><span class="desktop-meta">Due day</span><span>Pts</span><span>Status</span><span></span></div>';
  if(!chores.length) html+='<div class="empty">No weekly chores yet</div>';
  chores.forEach(c=>{
    const done=dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done||false;
    html+=`<div class="chore-row w-grid${done?' done':''}" onclick="toggleChore('${c.id}','weekly','${todayStr}')">

      <button class="edit-btn" onclick="openEdit(event,'${c.id}','weekly')"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>`;
  });
  html+=`<div class="add-row">
    <input class="add-input" id="add-weekly-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('weekly')">

    <button class="add-btn" onclick="addChore('weekly')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-weekly').innerHTML=html;
}

function renderMonthly(){
  const chores=sortChores(choresFor('monthly'),c=>dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done||false);
  let html='<div class="card">';
  html+='<div class="col-head m-grid"><span></span><span>Chore</span><span>Assigned</span><span class="desktop-meta">Last done</span><span>Pts</span><span>Status</span><span></span></div>';
  if(!chores.length) html+='<div class="empty">No monthly chores yet</div>';
  chores.forEach(c=>{
    const done=dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done||false;
    let sl,sc;
    if(done){sl='Done';sc='ps';}
    else if(!c.last_done){sl='Not set';sc='pp';}
    else{
      const days=Math.floor((new Date()-new Date(c.last_done))/86400000);
      if(days>35){sl='Overdue';sc='po';}else if(days>25){sl='Due soon';sc='pp';}else{sl='On track';sc='ps';}
    }
    const ld=c.last_done?new Date(c.last_done+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}):'—';
    html+=`<div class="chore-row m-grid${done?' done':''}" onclick="toggleChore('${c.id}','monthly','${todayStr}')">
      <div class="cb${done?' on':''}"></div>
      <div class="chore-cell">
        <span class="chore-name">${esc(c.name)}</span>
        <div class="chore-meta-line"><span class="meta-tag">Last: ${ld}</span></div>
      </div>
      <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
      <span class="desktop-meta" style="font-size:12px;color:#999">${ld}</span>
      ${ptsBadge('monthly',done)}
      <span class="pill ${sc}">${sl}</span>
      <button class="edit-btn" onclick="openEdit(event,'${c.id}','monthly')"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>`;
  });
  html+=`<div class="add-row">
    <input class="add-input" id="add-monthly-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('monthly')">
    <select class="add-select" id="add-monthly-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
    <button class="add-btn" onclick="addChore('monthly')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-monthly').innerHTML=html;
}

function renderOccasional(){
  const chores=sortChores(choresFor('occasional'),c=>dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done||false);
  let html='<div class="card">';
  html+='<div class="col-head o-grid"><span></span><span>Chore</span><span>Assigned</span><span class="desktop-meta">Last done</span><span>Pts</span><span>Status</span><span></span></div>';
  if(!chores.length) html+='<div class="empty">No occasional chores yet</div>';
  chores.forEach(c=>{
    const{label,cls}=occasionalStatus(c);
    const done=dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done||false;
    const ld=c.last_done?new Date(c.last_done+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}):'—';
    const interval=parseInt(c.sort_order)||180;
    html+=`<div class="chore-row o-grid${done?' done':''}" onclick="toggleChore('${c.id}','occasional','${todayStr}')">
      <div class="cb${done?' on':''}"></div>
      <div class="chore-cell">
        <span class="chore-name">${esc(c.name)} <span style="font-size:11px;color:#bbb">(${intervalLabel(interval)})</span></span>
        <div class="chore-meta-line"><span class="meta-tag">Last: ${ld}</span><span class="meta-tag">${intervalLabel(interval)}</span></div>
      </div>
      <span class="pill ${pillClass(c.assigned_to)}">${c.assigned_to}</span>
      <span class="desktop-meta" style="font-size:12px;color:#999">${ld}</span>
      ${ptsBadge('occasional',done)}
      <span class="pill ${cls}">${label}</span>
      <button class="edit-btn" onclick="openEdit(event,'${c.id}','occasional')"><i class="ti ti-edit" style="font-size:13px"></i></button>
    </div>`;
  });
  html+=`<div class="add-row">
    <input class="add-input" id="add-occasional-name" placeholder="Add a chore..." onkeydown="if(event.key==='Enter')addChore('occasional')">
    <select class="add-select" id="add-occasional-assign"><option>Both</option><option>Jake</option><option>Marysa</option><option>Either</option></select>
    <select class="add-select" id="add-occasional-interval">
      <option value="60">Every 2 months</option>
      <option value="90">Every 3 months</option>
      <option value="180" selected>Every 6 months</option>
      <option value="365">Every year</option>
      <option value="730">Every 2 years</option>
    </select>
    <button class="add-btn" onclick="addChore('occasional')"><i class="ti ti-plus"></i> Add</button>
  </div></div>`;
  document.getElementById('tab-occasional').innerHTML=html;
}

function renderRewards(){
  const setupDone=!!currentPerson;
  const myPts=currentPerson==='Jake'?jakePoints:currentPerson==='Marysa'?marysaPoints:0;
  const myWeek=currentPerson==='Jake'?jakeWeekPts:currentPerson==='Marysa'?marysaWeekPts:0;
  const otherName=currentPerson==='Jake'?'Marysa':'Jake';
  const otherPts=currentPerson==='Jake'?marysaPoints:jakePoints;
  const otherWeek=currentPerson==='Jake'?marysaWeekPts:jakeWeekPts;
  let html='<div class="card">';
  if(!setupDone){
    html+=`<div class="rewards-setup">
      <div class="rewards-setup-title">Who are you on this device?</div>
      <div class="rewards-setup-sub">Saved locally — only need to do this once. Tap "Switch device identity" below to change.</div>
      <div class="setup-btns">
        <div class="setup-btn" onclick="setPerson('Jake')"><div class="setup-avatar av-j">JM</div><div class="setup-name">Jake</div><div class="setup-role">This is my phone</div></div>
        <div class="setup-btn" onclick="setPerson('Marysa')"><div class="setup-avatar av-m">MM</div><div class="setup-name">Marysa</div><div class="setup-role">This is my phone</div></div>
      </div>
    </div>`;
  }else{
    html+=`<div class="rewards-balances">
      <div class="balance-card balance-you">
        <div class="balance-name">${currentPerson} (you)</div>
        <div class="balance-val">${myPts} pts</div>
        <div class="balance-week">+${myWeek} this week</div>
      </div>
      <div class="balance-card">
        <div class="balance-name">${otherName}</div>
        <div class="balance-val">${otherPts} pts</div>
        <div class="balance-week">+${otherWeek} this week</div>
      </div>
    </div>`;
    html+='<div class="confetti-wrap" id="confetti-zone"></div>';
    REWARDS.forEach(r=>{
      const canAfford=myPts>=REWARD_COST;
      html+=`<div class="reward-row">
        <div><div class="reward-name">${esc(r)}</div><div class="reward-cost">${REWARD_COST} pts</div></div>
        <button class="redeem-btn" ${canAfford?'':'disabled'} onclick="redeemReward('${esc(r)}')">Redeem</button>
      </div>`;
    });
    html+=`<div class="rewards-reset-row"><span class="rewards-reset-link" onclick="resetPerson()">Switch device identity</span></div>`;
    if(allRedemptions.length){
      html+=`<div class="redemption-log-section"><div class="redemption-log-title">Redemption history</div>`;
      allRedemptions.forEach(r=>{
        const d=new Date(r.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'});
        html+=`<div class="redemption-log-row">
          <span class="date-lbl">${d}</span>
          <span class="chore-name" style="font-size:12px">${esc(r.reward_name)}</span>
          <span class="pill ${pillClass(r.person)}">${r.person}</span>
        </div>`;
      });
      html+='</div>';
    }
  }
  html+='</div>';
  document.getElementById('tab-rewards').innerHTML=html;
}

function renderActivity(comps,redemptions){
  const allEntries=[];
  comps.forEach(c=>{allEntries.push({date:new Date(c.completed_at),chore:c.chore_name||'',person:c.completed_by||c.assigned_to||'',pts:+(FREQ_PTS[c.frequency]||1),type:'earn',freq:c.frequency});});
  redemptions.forEach(r=>{allEntries.push({date:new Date(r.created_at),chore:r.reward_name,person:r.person,pts:-r.points_spent,type:'redeem',freq:null});});
  allEntries.sort((a,b)=>b.date-a.date);
  const shown=allEntries.slice(0,60);
  let html='<div class="card">';
  html+='<div class="col-head l-grid"><span>Date</span><span>Activity</span><span>Who</span><span>Pts</span><span class="hide-mobile">Type</span></div>';
  if(!shown.length) html+='<div class="empty">No activity yet</div>';
  shown.forEach(e=>{
    const d=e.date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const ptsHtml=e.pts>0?`<span class="pts-badge earned">+${e.pts}</span>`:`<span class="pts-badge spent">${e.pts}</span>`;
    const typeLabel=e.type==='redeem'?'Reward':e.freq?e.freq.charAt(0).toUpperCase()+e.freq.slice(1):'—';
    const typeCls=e.type==='redeem'?'to':e.freq==='daily'?'td':e.freq==='weekly'?'tw':e.freq==='monthly'?'tm':'to';
    html+=`<div class="log-row l-grid">
      <span class="date-lbl">${d}</span>
      <span class="chore-name" style="font-size:12px">${esc(e.chore)}</span>
      <span class="pill ${pillClass(e.person)}">${e.person}</span>
      ${ptsHtml}
      <span class="hide-mobile"><span class="type-badge ${typeCls}">${typeLabel}</span></span>
    </div>`;
  });
  html+='</div>';
  document.getElementById('tab-activity').innerHTML=html;
}

function renderAll(){renderDaily();renderWeekly();renderMonthly();renderOccasional();}

function updateStats(){
  const daily=allChores.filter(c=>c.frequency==='daily'&&isDueOnDate(c,todayStr));
  const doneDaily=daily.filter(c=>dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done).length;
  const pctD=daily.length?Math.round(doneDaily/daily.length*100):0;
  document.getElementById('s-today-pct').textContent=pctD+'%';
  document.getElementById('s-today-sub').textContent=doneDaily+' of '+daily.length+' done';
  const weekly=allChores.filter(c=>c.frequency==='weekly');
  const doneWeekly=weekly.filter(c=>dailyStatusMap[getDailyStatusKey(c.id,todayStr)]?.done).length;
  const pctW=weekly.length?Math.round(doneWeekly/weekly.length*100):0;
  document.getElementById('s-week-pct').textContent=pctW+'%';
  document.getElementById('s-week-sub').textContent=doneWeekly+' of '+weekly.length+' done';
}

function openWhoModal(choreId,freq,dateStr){
  pendingToggleId=choreId;pendingToggleFreq=freq;pendingToggleDateStr=dateStr;
  whoModalSelected=currentPerson||null;
  document.querySelectorAll('.who-modal-btn').forEach(b=>b.classList.remove('selected'));
  if(whoModalSelected){
    const el=document.getElementById('wm-'+whoModalSelected.toLowerCase());
    if(el) el.classList.add('selected');
  }
  document.getElementById('who-modal').classList.add('open');
}

function selectWhoCompleted(who){
  whoModalSelected=who;
  document.querySelectorAll('.who-modal-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('wm-'+who.toLowerCase()).classList.add('selected');
}

function closeWhoModal(){
  document.getElementById('who-modal').classList.remove('open');
  pendingToggleId=null;pendingToggleFreq=null;pendingToggleDateStr=null;whoModalSelected=null;
}

async function confirmWhoCompleted(){
  if(!whoModalSelected||!pendingToggleId) return;
  const id=pendingToggleId,freq=pendingToggleFreq,dStr=pendingToggleDateStr,who=whoModalSelected;
  closeWhoModal();
  await doToggle(id,freq,dStr,who);
}

async function toggleChore(id,freq,dateStr){
  const key=getDailyStatusKey(id,dateStr);
  const current=dailyStatusMap[key]?.done||false;
  if(current){await doToggle(id,freq,dateStr,null);return;}
  const chore=allChores.find(c=>c.id===id);
  if(chore&&(chore.assigned_to==='Both'||chore.assigned_to==='Either')){
    openWhoModal(id,freq,dateStr);
  }else{
    const completedBy=currentPerson||(currentWho!=='All'?currentWho:chore?.assigned_to||'');
    await doToggle(id,freq,dateStr,completedBy);
  }
}

async function doToggle(id,freq,dateStr,completedBy){
  const key=getDailyStatusKey(id,dateStr);
  const current=dailyStatusMap[key]?.done||false;
  const newVal=!current;
  try{
    if(dailyStatusMap[key]){
      await api('daily_status?chore_id=eq.'+id+'&status_date=eq.'+dateStr,'PATCH',{done:newVal});
    }else{
      await api('daily_status','POST',{chore_id:id,status_date:dateStr,done:newVal});
    }
    const chore=allChores.find(c=>c.id===id);
    if(newVal&&chore){
      const updates={};
      if(freq==='daily') updates.streak=(chore.streak||0)+1;
      if(freq==='monthly'||freq==='occasional') updates.last_done=dateStr;
      if(Object.keys(updates).length){await api('chores?id=eq.'+id,'PATCH',updates);Object.assign(chore,updates);}
      const loggedBy=completedBy||currentPerson||chore.assigned_to;
      await api('completions','POST',{chore_id:id,chore_name:chore.name,assigned_to:chore.assigned_to,frequency:freq,completed_by:loggedBy});
      const peopleToCredit=completedBy==='Both'?['Jake','Marysa']:[loggedBy];
      for(const person of peopleToCredit){
        if(person==='Jake'||person==='Marysa'){
          const pts=FREQ_PTS[freq]||1;
          await api('points','POST',{person,amount:pts,chore_name:chore.name,frequency:freq,reason:'chore_complete'});
          if(person==='Jake'){jakePoints+=pts;jakeWeekPts+=pts;}
          else{marysaPoints+=pts;marysaWeekPts+=pts;}
        }
      }
      updatePtsDisplay();
      if(activeTab==='rewards') renderRewards();
    }
    dailyStatusMap[key]={done:newVal,chore_id:id,status_date:dateStr};
    buildDayStrip();
    if(freq==='daily') renderDaily();
    else if(freq==='weekly') renderWeekly();
    else if(freq==='monthly') renderMonthly();
    else renderOccasional();
    updateStats();
  }catch(e){showToast('Error saving');console.error(e);}
}

async function redeemReward(name){
  if(!currentPerson) return;
  const myPts=currentPerson==='Jake'?jakePoints:marysaPoints;
  if(myPts<REWARD_COST) return;
  if(!confirm('Redeem "'+name+'" for '+REWARD_COST+' pts?')) return;
  try{
    const [created]=await api('redemptions','POST',{person:currentPerson,reward_name:name,points_spent:REWARD_COST});
    allRedemptions.unshift(created);
    if(currentPerson==='Jake') jakePoints-=REWARD_COST;
    else marysaPoints-=REWARD_COST;
    updatePtsDisplay();renderRewards();launchConfetti();
    showToast(currentPerson+' redeemed: '+name);
  }catch(e){showToast('Error redeeming');console.error(e);}
}

function launchConfetti(){
  const zone=document.getElementById('confetti-zone');
  if(!zone) return;
  const colors=['#E8620A','#FFE099','#3B6D11','#0C447C','#72243E','#FBEAF0','#EAF3DE'];
  for(let i=0;i<36;i++){
    const p=document.createElement('div');
    p.className='cp';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*.5+'s';
    p.style.animationDuration=(.9+Math.random()*.7)+'s';
    p.style.width=(5+Math.random()*7)+'px';
    p.style.height=(5+Math.random()*7)+'px';
    zone.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }
}

function setPerson(name){
  currentPerson=name;
  localStorage.setItem('mason_person',name);
  applyPersonDefaults();applyDarkMode();updatePtsDisplay();renderAll();renderRewards();
}

function resetPerson(){
  if(!confirm('Switch device identity?')) return;
  currentPerson=null;localStorage.removeItem('mason_person');
  currentWho='All';applyPersonDefaults();applyDarkMode();updatePtsDisplay();renderRewards();
}

async function resetDailyConfirm(){
  if(!confirm('Reset all daily chores for today?')) return;
  const dc=allChores.filter(c=>c.frequency==='daily');
  try{
    await Promise.all(dc.map(c=>{
      const key=getDailyStatusKey(c.id,todayStr);
      if(dailyStatusMap[key]) return api('daily_status?chore_id=eq.'+c.id+'&status_date=eq.'+todayStr,'PATCH',{done:false});
      return Promise.resolve();
    }));
    dc.forEach(c=>{const key=getDailyStatusKey(c.id,todayStr);if(dailyStatusMap[key]) dailyStatusMap[key].done=false;});
    buildDayStrip();renderDaily();updateStats();showToast('Daily chores reset');
  }catch(e){showToast('Error resetting');}
}

async function resetWeekly(){
  if(!confirm('Reset all weekly chores for the new week?')) return;
  const wc=allChores.filter(c=>c.frequency==='weekly');
  try{
    await Promise.all(wc.map(c=>{
      const key=getDailyStatusKey(c.id,todayStr);
      if(dailyStatusMap[key]) return api('daily_status?chore_id=eq.'+c.id+'&status_date=eq.'+todayStr,'PATCH',{done:false});
      return Promise.resolve();
    }));
    wc.forEach(c=>{const key=getDailyStatusKey(c.id,todayStr);if(dailyStatusMap[key]) dailyStatusMap[key].done=false;});
    renderWeekly();updateStats();showToast('Weekly chores reset');
  }catch(e){showToast('Error resetting');}
}

async function addChore(freq){
  const nameEl=document.getElementById('add-'+freq+'-name');
  const assignEl=document.getElementById('add-'+freq+'-assign');
  const name=nameEl.value.trim();
  if(!name) return;
  const extras={};
  if(freq==='daily'){extras.sub_section=document.getElementById('add-daily-sec').value;extras.daily_interval=1;}
  if(freq==='weekly') extras.due_day=document.getElementById('add-weekly-day').value;
  if(freq==='occasional') extras.sort_order=parseInt(document.getElementById('add-occasional-interval').value)||180;
  try{
    const [created]=await api('chores','POST',{name,assigned_to:assignEl.value,frequency:freq,...extras});
    allChores.push(created);nameEl.value='';
    if(freq==='daily') renderDaily();
    else if(freq==='weekly') renderWeekly();
    else if(freq==='monthly') renderMonthly();
    else renderOccasional();
    updateStats();showToast('Chore added');
  }catch(e){showToast('Error adding chore');console.error(e);}
}

function openEdit(e,id,freq){
  e.stopPropagation();
  activeChoreId=id;activeFreq=freq;
  const chore=allChores.find(c=>c.id===id);
  if(!chore) return;
  document.getElementById('m-name').value=chore.name;
  document.getElementById('m-assign').value=chore.assigned_to;
  document.getElementById('m-streak').value=chore.streak||0;
  document.getElementById('m-streak-field').style.display=freq==='daily'?'':'none';
  document.getElementById('m-interval-daily-field').style.display=freq==='daily'?'':'none';
  document.getElementById('m-day-field').style.display=freq==='weekly'?'':'none';
  document.getElementById('m-lastdone-field').style.display=(freq==='monthly'||freq==='occasional')?'':'none';
  document.getElementById('m-interval-field').style.display=freq==='occasional'?'':'none';
  document.getElementById('m-subsection-field').style.display=freq==='daily'?'':'none';
  if(freq==='daily'){
    document.getElementById('m-interval-daily').value=chore.daily_interval||1;
    document.getElementById('m-subsection').value=normalizeSubsection(chore.sub_section);
  }
  if(freq==='weekly'&&chore.due_day) document.getElementById('m-day').value=chore.due_day;
  if((freq==='monthly'||freq==='occasional')&&chore.last_done) document.getElementById('m-lastdone').value=chore.last_done;
  if(freq==='occasional') document.getElementById('m-interval').value=chore.sort_order||180;
  document.getElementById('modal').classList.add('open');
}

async function saveChore(){
  if(!activeChoreId) return;
  const updates={name:document.getElementById('m-name').value.trim(),assigned_to:document.getElementById('m-assign').value};
  if(activeFreq==='daily'){
    updates.streak=parseInt(document.getElementById('m-streak').value)||0;
    updates.sub_section=document.getElementById('m-subsection').value;
    updates.daily_interval=parseInt(document.getElementById('m-interval-daily').value)||1;
  }
  if(activeFreq==='weekly') updates.due_day=document.getElementById('m-day').value;
  if(activeFreq==='monthly') updates.last_done=document.getElementById('m-lastdone').value||null;
  if(activeFreq==='occasional'){updates.last_done=document.getElementById('m-lastdone').value||null;updates.sort_order=parseInt(document.getElementById('m-interval').value)||180;}
  try{
    await api('chores?id=eq.'+activeChoreId,'PATCH',updates);
    const idx=allChores.findIndex(c=>c.id===activeChoreId);
    if(idx>=0) allChores[idx]={...allChores[idx],...updates};
    closeModal();renderAll();showToast('Saved');
  }catch(e){showToast('Error saving');}
}

async function deleteChore(){
  if(!activeChoreId||!confirm('Delete this chore?')) return;
  try{
    await api('chores?id=eq.'+activeChoreId,'DELETE');
    allChores=allChores.filter(c=>c.id!==activeChoreId);
    closeModal();renderAll();updateStats();showToast('Deleted');
  }catch(e){showToast('Error deleting');}
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  activeChoreId=null;activeFreq=null;
}

function showTab(name,btn){
  ['daily','weekly','monthly','occasional','rewards','activity'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTab=name;
  document.getElementById('day-strip').style.display=name==='daily'?'':'none';
  document.getElementById('viewing-banner').classList.toggle('show',name==='daily'&&selectedDateStr!==todayStr);
  if(name==='rewards') renderRewards();
  if(name==='activity') reloadActivity();
}

async function reloadActivity(){
  try{
    const [comps,redemptions]=await Promise.all([
      api('completions?order=completed_at.desc&limit=80'),
      api('redemptions?order=created_at.desc')
    ]);
    renderActivity(comps||[],redemptions||[]);
  }catch(e){}
}

async function refreshData(){
  showToast('Refreshing...');await loadAll();showToast('Up to date');
}

function setWho(who,btn){
  currentWho=who;
  document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function esc(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this) closeModal();});
document.getElementById('who-modal').addEventListener('click',function(e){if(e.target===this) closeWhoModal();});

applyDarkMode();
setInterval(applyDarkMode,10*60*1000);
loadAll();
</script>
