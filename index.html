<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:780px;margin:0 auto}
.header{flex-shrink:0;background:#f5f5f5;padding:1rem 1rem 0;z-index:10}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.logo-icon{width:36px;height:36px;border-radius:9px;background:#E8620A;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;transition:opacity .15s}
.logo:active .logo-icon{opacity:.7}
.app-title{font-size:16px;font-weight:600;color:#1a1a1a}
.app-sub{font-size:12px;color:#888}
.who-toggle{display:flex;border:1px solid #ddd;border-radius:8px;overflow:hidden;background:#fff}
.who-btn{padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;background:transparent;border:none;color:#666;transition:all .15s}
.who-btn.active{background:#E8620A;color:#fff}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.stat{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid #eee}
.stat-label{font-size:11px;color:#888;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;color:#1a1a1a;line-height:1}
.stat-sub{font-size:11px;color:#aaa;margin-top:3px}
.stat-pts{background:#FFF8EE;border-color:#FDECC8}
.stat-pts .stat-label{color:#854F0B}
.stat-pts .stat-val{color:#854F0B;font-size:18px}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{flex:1;padding:6px 2px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .15s;text-align:center;white-space:nowrap}
.tab.active{background:#E8620A;color:#fff;border-color:#E8620A}
.content{flex:1;overflow-y:auto;padding:0 1rem 1.5rem;-webkit-overflow-scrolling:touch}
.card{background:#fff;border:1px solid #eee;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.tab-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #f0f0f0;background:#fafafa}
.tab-toolbar-label{font-size:12px;color:#888}
.reset-btn{padding:5px 12px;border-radius:7px;border:1px solid #ffcdd2;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#c62828;display:flex;align-items:center;gap:5px}
.col-head{display:grid;align-items:center;padding:8px 16px;font-size:11px;font-weight:600;color:#999;background:#fafafa;border-bottom:1px solid #eee;text-transform:uppercase;letter-spacing:.04em;gap:8px}
.d-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 62px 26px}
.w-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 62px 26px}
.m-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 74px 26px}
.o-grid{grid-template-columns:26px minmax(0,1fr) 72px 48px 74px 26px}
.l-grid{grid-template-columns:80px minmax(0,1fr) 72px 44px 44px}
.sec-row{display:flex;align-items:center;gap:8px;padding:7px 16px;font-size:11px;font-weight:600;color:#888;background:#fafafa;border-bottom:1px solid #f0f0f0;text-transform:uppercase;letter-spacing:.04em}
.prog-bar{flex:1;height:3px;border-radius:2px;background:#eee;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;background:#E8620A;transition:width .3s}
.prog-lbl{font-size:11px;color:#bbb;min-width:28px;text-align:right}
.chore-row{display:grid;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;cursor:pointer;transition:background .1s;gap:8px}
.chore-row:last-of-type{border-bottom:none}
.chore-row:hover{background:#fafafa}
.chore-row.done .chore-name{text-decoration:line-through;color:#bbb}
.chore-row.done .chore-meta-line{opacity:.4}
.cb{width:18px;height:18px;border-radius:5px;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:#fff}
.cb.on{background:#E8620A;border-color:#E8620A}
.cb.on::after{content:'';width:9px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.chore-cell{display:flex;flex-direction:column;gap:2px;min-width:0}
.chore-name{font-size:13px;color:#1a1a1a;line-height:1.3;word-break:break-word}
.chore-meta-line{font-size:11px;color:#aaa;display:none;align-items:center;gap:6px;flex-wrap:wrap}
.chore-meta-line .meta-tag{background:#f5f5f5;padding:1px 6px;border-radius:4px;font-size:11px;color:#888}
.pill{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:3px 9px;border-radius:7px;white-space:nowrap}
.pj{background:#E6F1FB;color:#0C447C}
.pm{background:#FBEAF0;color:#72243E}
.pb{background:#EAF3DE;color:#27500A}
.pe{background:#F3EFFE;color:#3C3489}
.ps{background:#EAF3DE;color:#27500A}
.pp{background:#FFF3E0;color:#8B4513}
.po{background:#FCEBEB;color:#A32D2D}
.pts-badge{font-size:10px;font-weight:600;color:#854F0B;background:#FAEEDA;padding:2px 7px;border-radius:5px;white-space:nowrap;text-align:center}
.pts-badge.earned{background:#EAF3DE;color:#27500A}
.pts-badge.spent{background:#FCEBEB;color:#A32D2D}
.meta{font-size:12px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.edit-btn{width:26px;height:26px;border-radius:7px;border:1px solid #eee;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#bbb;transition:all .15s;opacity:0;flex-shrink:0}
.chore-row:hover .edit-btn{opacity:1}
.edit-btn:hover{background:#f0f0f0;color:#666}
.add-row{display:flex;align-items:center;gap:8px;padding:10px 16px;border-top:1px solid #f0f0f0;background:#fafafa;flex-wrap:wrap}
.add-input{flex:1;min-width:120px;border:1px solid #ddd;border-radius:8px;padding:7px 12px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}

.add-select{border:1px solid #ddd;border-radius:8px;padding:7px 10px;font-size:12px;background:#fff;color:#1a1a1a;outline:none;cursor:pointer}
.add-btn{padding:7px 14px;border-radius:8px;border:1px solid #E8620A;background:#E8620A;font-size:12px;font-weight:500;cursor:pointer;color:#fff;white-space:nowrap}
.add-btn:hover{opacity:.85}
.log-row{display:grid;align-items:center;padding:8px 16px;border-bottom:1px solid #f5f5f5;gap:8px}
.log-row:last-child{border-bottom:none}
.date-lbl{font-size:12px;color:#999}
.type-badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:6px}
.td{background:#E6F1FB;color:#0C447C}
.tw{background:#EAF3DE;color:#27500A}
.tm{background:#FAEEDA;color:#633806}
.to{background:#F3EFFE;color:#3C3489}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:360px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:1.25rem}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#888;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus{border-color:#E8620A}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.btn-save{padding:8px 18px;border-radius:8px;border:none;background:#E8620A;color:#fff;font-size:13px;font-weight:500;cursor:pointer}
.btn-cancel{padding:8px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#666}
.btn-delete{padding:8px 14px;border-radius:8px;border:1px solid #ffcdd2;background:#fff;font-size:13px;cursor:pointer;color:#c62828;margin-right:auto}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#E8620A;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:3rem;color:#999;font-size:14px}
.empty{text-align:center;padding:2rem;color:#bbb;font-size:13px}
.rewards-setup{padding:1rem;border-bottom:1px solid #f0f0f0;background:#fafafa}
.rewards-setup-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.rewards-setup-sub{font-size:12px;color:#888;margin-bottom:12px}
.setup-btns{display:flex;gap:10px}
.setup-btn{flex:1;padding:12px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer;text-align:center;transition:all .15s}
.setup-btn:hover{border-color:#E8620A}
.setup-btn.chosen{border:2px solid #E8620A;background:#FFF8EE}
.setup-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;margin:0 auto 6px}
.av-j{background:#E6F1FB;color:#0C447C}
.av-m{background:#FBEAF0;color:#72243E}
.setup-name{font-size:13px;font-weight:600;color:#1a1a1a}
.setup-role{font-size:11px;color:#888;margin-top:2px}
.rewards-balances{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #f0f0f0}
.balance-card{padding:14px 16px}
.balance-card:first-child{border-right:1px solid #f0f0f0}
.balance-name{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.balance-val{font-size:22px;font-weight:600;color:#854F0B}
.balance-week{font-size:11px;color:#aaa;margin-top:2px}
.balance-you{background:#FFF8EE}
.reward-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f5f5f5}
.reward-row:last-of-type{border-bottom:none}
.reward-name{font-size:13px;font-weight:500;color:#1a1a1a}
.reward-cost{font-size:11px;color:#888;margin-top:2px}
.redeem-btn{padding:6px 14px;border-radius:8px;border:none;background:#E8620A;color:#fff;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.redeem-btn:hover{opacity:.85}
.redeem-btn:disabled{background:#eee;color:#bbb;cursor:not-allowed;opacity:1}
.rewards-reset-row{padding:12px 16px;border-top:1px solid #f0f0f0;text-align:center}
.rewards-reset-link{font-size:12px;color:#bbb;cursor:pointer;text-decoration:underline}
.confetti-wrap{position:relative;height:0;overflow:visible;pointer-events:none;z-index:50}
.cp{position:absolute;width:8px;height:8px;border-radius:2px;animation:cfal 1.3s ease-out forwards}
@keyframes cfal{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(130px) rotate(720deg);opacity:0}}
@media(max-width:600px){
  .header{padding:.75rem .75rem 0}
  .stats{grid-template-columns:repeat(3,1fr);gap:6px}
  .stat{padding:10px 8px}
  .stat-val{font-size:17px}
  .stat-pts .stat-val{font-size:15px}
  .stat-label{font-size:10px}
  .stat-sub{font-size:10px}
  .tab{font-size:10px;padding:5px 1px}
  .content{padding:0 .75rem 1.5rem}
  .d-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 58px 26px}
  .w-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 58px 26px}
  .m-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 66px 26px}
  .o-grid{grid-template-columns:26px minmax(0,1fr) 58px 42px 66px 26px}
  .l-grid{grid-template-columns:62px minmax(0,1fr) 58px 36px}
  .col-head .desktop-meta{display:none}
  .chore-row .desktop-meta{display:none}
  .chore-meta-line{display:flex}
  .edit-btn{opacity:1;width:22px;height:22px}
  .add-row{gap:6px;padding:8px 12px}
  .add-select{padding:7px 6px;font-size:11px}
  .add-btn{padding:7px 10px;font-size:11px}
  .log-row .hide-mobile{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="topbar">
      <div class="logo" onclick="refreshData()">
        <div class="logo-icon"><i class="ti ti-home"></i></div>
        <div><div class="app-title">Mason Household</div><div class="app-sub">Tap house to refresh</div></div>
      </div>
      <div class="who-toggle">
        <button class="who-btn" id="who-all" onclick="setWho('All',this)">All</button>
        <button class="who-btn" id="who-jake" onclick="setWho('Jake',this)">Jake</button>
        <button class="who-btn" id="who-marysa" onclick="setWho('Marysa',this)">Marysa</button>

    </div>
    <div class="stats">
      <div class="stat"><div class="stat-label">Today</div><div class="stat-val" id="s-today-pct">—</div><div class="stat-sub" id="s-today-sub"></div></div>

      <div class="stat stat-pts"><div class="stat-label" id="pts-label">Your pts</div><div class="stat-val" id="s-pts">—</div><div class="stat-sub">50 to redeem</div></div>

    <div class="tabs">
      <button class="tab active" onclick="showTab('daily',this)">Daily</button>
      <button class="tab" onclick="showTab('weekly',this)">Weekly</button>
      <button class="tab" onclick="showTab('monthly',this)">Monthly</button>
      <button class="tab" onclick="showTab('occasional',this)">Occasional</button>
      <button class="tab" onclick="showTab('rewards',this)">Rewards</button>

  <div class="content">

    <div id="tab-weekly" style="display:none"><div class="loading">Loading...</div></div>
    <div id="tab-monthly" style="display:none"><div class="loading">Loading...</div></div>
    <div id="tab-occasional" style="display:none"><div class="loading">Loading...</div></div>
    <div id="tab-rewards" style="display:none"><div class="loading">Loading...</div></div>
    <div id="tab-activity" style="display:none"><div class="loading">Loading...</div></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Edit chore</div>
    <div class="field"><label>Chore name</label><input id="m-name" type="text"></div>
    <div class="field"><label>Assigned to</label>
      <select id="m-assign"><option>Jake</option><option>Marysa</option><option>Both</option><option>Either</option></select>
    </div>
    <div id="m-streak-field" class="field"><label>Streak (days)</label><input id="m-streak" type="number" min="0"></div>
    <div id="m-day-field" class="field" style="display:none"><label>Due day</label>
      <select id="m-day"><option>Monday</option><option>Tuesday</option><option>Wednesday</option><option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option></select>
    </div>

      <select id="m-interval">
        <option value="60">Every 2 months</option>
        <option value="90">Every 3 months</option>
        <option value="180">Every 6 months</option>
        <option value="365">Every year</option>
        <option value="730">Every 2 years</option>
      </select>
    </div>
    <div id="m-subsection-field" class="field"><label>Sub-section</label>
      <select id="m-subsection"><option value="AM">AM</option><option value="PM">PM</option></select>

      <button class="btn-delete" onclick="deleteChore()">Delete</button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPA_URL='https://skyjfrzjtnhlupwtsjsu.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNreWpmcnpqdG5obHVwd3RzanN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNDAzNTcsImV4cCI6MjA5NTgxNjM1N30.kQDBWrDug6uMWL9BJaQMN28tJvF-R_ao40BY7CsRJaA';
const HEADERS={'Content-Type':'application/json','apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY};

const FREQ_PTS={daily:1,weekly:3,monthly:5,occasional:10};
const REWARDS=['You pick date night','Partner picks date night','No-veto movie night','Massage','Partner does your weekly chores','No-veto week of meals','You pick the sex','$25 shopping spree'];
const REWARD_COST=50;
const ASSIGN_ORDER={'Jake':0,'Marysa':1,'Either':2,'Both':3};

let allChores=[],dailyStatus={},activeChoreId=null,activeFreq=null;
let currentWho='All',activeTab='daily';
let currentPerson=localStorage.getItem('mason_person')||null;
let jakePoints=0,marysaPoints=0,jakeWeekPts=0,marysaWeekPts=0;
const today=new Date().toISOString().split('T')[0];

async function api(path,method='GET',body=null){
  const opts={method,headers:{...HEADERS,'Prefer':method==='POST'?'return=representation':''}};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPA_URL+'/rest/v1/'+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  const txt=await r.text();
  return txt?JSON.parse(txt):null;
}

async function loadAll(){
  try{
    const [chores,statuses,comps,pts,redemptions]=await Promise.all([
      api('chores?order=sort_order.asc,created_at.asc'),
      api('daily_status?status_date=eq.'+today),
      api('completions?order=completed_at.desc&limit=80'),
      api('points?order=created_at.desc'),
      api('redemptions?order=created_at.desc')
    ]);
    allChores=(chores||[]).map(c=>{
      if(c.frequency==='daily'){
        const s=c.sub_section;
        if(s==='Morning'||s==='Daytime') return{...c,sub_section:'AM'};
        if(s==='Evening') return{...c,sub_section:'PM'};
      }
      return c;
    });
    dailyStatus={};
    (statuses||[]).forEach(s=>{dailyStatus[s.chore_id]=s;});
    calcPoints(pts||[],redemptions||[]);
    applyPersonDefaults();
    updatePtsDisplay();
    renderAll();
    renderRewards();
    renderActivity(comps||[],redemptions||[]);
    updateStats();
  }catch(e){showToast('Error loading data');console.error(e);}
}

function applyPersonDefaults(){
  if(currentPerson==='Jake'){
    currentWho='Jake';
    document.getElementById('who-jake').classList.add('active');
    document.getElementById('who-all').classList.remove('active');
    document.getElementById('who-marysa').classList.remove('active');
  } else if(currentPerson==='Marysa'){
    currentWho='Marysa';
    document.getElementById('who-marysa').classList.add('active');
    document.getElementById('who-all').classList.remove('active');
    document.getElementById('who-jake').classList.remove('active');
  } else {
    currentWho='All';
    document.getElementById('who-all').classList.add('active');
    document.getElementById('who-jake').classList.remove('active');
    document.getElementById('who-marysa').classList.remove('active');
  }
}

function calcPoints(pts,redemptions){
  jakePoints=0;marysaPoints=0;jakeWeekPts=0;marysaWeekPts=0;
  const weekMs=7*86400000;
  pts.forEach(p=>{
    if(p.person==='Jake'){jakePoints+=p.amount;if(new Date()-new Date(p.created_at)<weekMs)jakeWeekPts+=p.amount;}
    else{marysaPoints+=p.amount;if(new Date()-new Date(p.created_at)<weekMs)marysaWeekPts+=p.amount;}
  });
  redemptions.forEach(r=>{
    if(r.person==='Jake') jakePoints-=r.points_spent;
    else marysaPoints-=r.points_spent;
  });
  jakePoints=Math.max(0,jakePoints);
  marysaPoints=Math.max(0,marysaPoints);
}

function updatePtsDisplay(){
  const myPts=currentPerson==='Jake'?jakePoints:currentPerson==='Marysa'?marysaPoints:null;
  document.getElementById('pts-label').textContent=currentPerson?currentPerson+"'s pts":'Your pts';
  document.getElementById('s-pts').textContent=myPts!==null?myPts:'—';
}

function sortChores(chores,isDone){
  return chores.slice().sort((a,b)=>{
    const aDone=isDone(a)?1:0,bDone=isDone(b)?1:0;
    if(aDone!==bDone) return aDone-bDone;
    return (ASSIGN_ORDER[a.assigned_to]??4)-(ASSIGN_ORDER[b.assigned_to]??4);
  });
}

function choresFor(freq){
  let list=allChores.filter(c=>c.frequency===freq);
  if(currentWho!=='All') list=list.filter(c=>c.assigned_to===currentWho||c.assigned_to==='Both'||c.assigned_to==='Either');
  return list;
}

function pillClass(a){return a==='Jake'?'pj':a==='Marysa'?'pm':a==='Either'?'pe':'pb';}

function ptsBadge(freq,done){
  const n=FREQ_PTS[freq]||1;
  const label=n===1?'+1 pt':'+'+n+' pts';
  return `<span class="pts-badge" style="${done?'':'opacity:.35;'}">${label}</span>`;
}

function intervalLabel(days){
  const d=parseInt(days);
  if(d<=60) return '2 mo';if(d<=90) return '3 mo';if(d<=180) return '6 mo';
  if(d<=365) return 'Yearly';return '2 yr';
}

function occasionalStatus(chore){
  const done=dailyStatus[chore.id]?.done||false;
  if(done) return{label:'Done',cls:'ps'};
  if(!chore.last_done) return{label:'Not set',cls:'pp'};
  const interval=parseInt(chore.sort_order)||180;
  const days=Math.floor((new Date()-new Date(chore.last_done))/86400000);
  const pct=days/interval;
  if(pct>=1) return{label:'Overdue',cls:'po'};
  if(pct>=0.85) return{label:'Due soon',cls:'pp'};
  return{label:'On track',cls:'ps'};
}

function toolbarHTML(label,resetFn){

}

  document.getElementById('s-week-sub').textContent=doneWeekly+' of '+weekly.length+' done';

async function resetDaily(){
  if(!confirm('Reset all daily chores?')) return;
  const dc=allChores.filter(c=>c.frequency==='daily');
  try{
    await Promise.all(dc.map(c=>dailyStatus[c.id]?api('daily_status?chore_id=eq.'+c.id+'&status_date=eq.'+today,'PATCH',{done:false}):Promise.resolve()));
    dc.forEach(c=>{if(dailyStatus[c.id]) dailyStatus[c.id].done=false;});
    renderDaily();updateStats();showToast('Daily chores reset');
  }catch(e){showToast('Error resetting');}
}

async function resetWeekly(){
  if(!confirm('Reset all weekly chores for the new week?')) return;
  const wc=allChores.filter(c=>c.frequency==='weekly');
  try{
    await Promise.all(wc.map(c=>dailyStatus[c.id]?api('daily_status?chore_id=eq.'+c.id+'&status_date=eq.'+today,'PATCH',{done:false}):Promise.resolve()));
    wc.forEach(c=>{if(dailyStatus[c.id]) dailyStatus[c.id].done=false;});
    renderWeekly();updateStats();showToast('Weekly chores reset');
  }catch(e){showToast('Error resetting');}
}

async function toggleChore(id,freq){
  const current=dailyStatus[id]?.done||false;
  const newVal=!current;
  try{
    if(dailyStatus[id]){
      await api('daily_status?chore_id=eq.'+id+'&status_date=eq.'+today,'PATCH',{done:newVal});
    }else{
      await api('daily_status','POST',{chore_id:id,status_date:today,done:newVal});
    }
    const chore=allChores.find(c=>c.id===id);
    if(newVal&&chore){
      const updates={};
      if(freq==='daily') updates.streak=(chore.streak||0)+1;
      if(freq==='monthly'||freq==='occasional') updates.last_done=today;
      if(Object.keys(updates).length){await api('chores?id=eq.'+id,'PATCH',updates);Object.assign(chore,updates);}
      const completedBy=currentPerson||(currentWho!=='All'?currentWho:chore.assigned_to);
      await api('completions','POST',{chore_id:id,chore_name:chore.name,assigned_to:chore.assigned_to,frequency:freq,completed_by:completedBy});
      if(currentPerson){
        const pts=FREQ_PTS[freq]||1;
        await api('points','POST',{person:currentPerson,amount:pts,chore_name:chore.name,frequency:freq,reason:'chore_complete'});
        if(currentPerson==='Jake'){jakePoints+=pts;jakeWeekPts+=pts;}
        else{marysaPoints+=pts;marysaWeekPts+=pts;}
        updatePtsDisplay();
        if(activeTab==='rewards') renderRewards();
      }
    }
    dailyStatus[id]={done:newVal};
    if(freq==='daily') renderDaily();
    else if(freq==='weekly') renderWeekly();
    else if(freq==='monthly') renderMonthly();
    else renderOccasional();
    updateStats();
  }catch(e){showToast('Error saving');console.error(e);}
}

async function redeemReward(name){
  if(!currentPerson) return;
  const myPts=currentPerson==='Jake'?jakePoints:marysaPoints;
  if(myPts<REWARD_COST) return;
  if(!confirm('Redeem "'+name+'" for '+REWARD_COST+' pts?')) return;
  try{
    await api('redemptions','POST',{person:currentPerson,reward_name:name,points_spent:REWARD_COST});
    if(currentPerson==='Jake') jakePoints-=REWARD_COST;
    else marysaPoints-=REWARD_COST;
    updatePtsDisplay();
    renderRewards();
    launchConfetti();
    showToast(currentPerson+' redeemed: '+name);
  }catch(e){showToast('Error redeeming');console.error(e);}
}

function launchConfetti(){
  const zone=document.getElementById('confetti-zone');
  if(!zone) return;
  const colors=['#E8620A','#FFE099','#3B6D11','#0C447C','#72243E','#FBEAF0','#EAF3DE'];
  for(let i=0;i<36;i++){
    const p=document.createElement('div');
    p.className='cp';
    p.style.left=Math.random()*100+'%';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*.5+'s';
    p.style.animationDuration=(.9+Math.random()*.7)+'s';
    p.style.width=(5+Math.random()*7)+'px';
    p.style.height=(5+Math.random()*7)+'px';
    zone.appendChild(p);
    setTimeout(()=>p.remove(),2000);
  }
}

function setPerson(name){
  currentPerson=name;
  localStorage.setItem('mason_person',name);
  applyPersonDefaults();
  updatePtsDisplay();
  renderAll();
  renderRewards();
}

function resetPerson(){
  if(!confirm('Switch device identity?')) return;
  currentPerson=null;
  localStorage.removeItem('mason_person');
  currentWho='All';
  applyPersonDefaults();
  updatePtsDisplay();
  renderRewards();
}

async function addChore(freq){
  const nameEl=document.getElementById('add-'+freq+'-name');
  const assignEl=document.getElementById('add-'+freq+'-assign');
  const name=nameEl.value.trim();
  if(!name) return;
  const extras={};
  if(freq==='daily') extras.sub_section=document.getElementById('add-daily-sec').value;
  if(freq==='weekly') extras.due_day=document.getElementById('add-weekly-day').value;
  if(freq==='occasional') extras.sort_order=parseInt(document.getElementById('add-occasional-interval').value)||180;
  try{
    const [created]=await api('chores','POST',{name,assigned_to:assignEl.value,frequency:freq,...extras});
    allChores.push(created);nameEl.value='';
    if(freq==='daily') renderDaily();
    else if(freq==='weekly') renderWeekly();
    else if(freq==='monthly') renderMonthly();
    else renderOccasional();
    updateStats();showToast('Chore added');
  }catch(e){showToast('Error adding chore');console.error(e);}
}

function openEdit(e,id,freq){
  e.stopPropagation();
  activeChoreId=id;activeFreq=freq;
  const chore=allChores.find(c=>c.id===id);
  if(!chore) return;
  document.getElementById('m-name').value=chore.name;
  document.getElementById('m-assign').value=chore.assigned_to;
  document.getElementById('m-streak').value=chore.streak||0;
  document.getElementById('m-streak-field').style.display=freq==='daily'?'':'none';
  document.getElementById('m-day-field').style.display=freq==='weekly'?'':'none';
  document.getElementById('m-lastdone-field').style.display=(freq==='monthly'||freq==='occasional')?'':'none';
  document.getElementById('m-interval-field').style.display=freq==='occasional'?'':'none';
  document.getElementById('m-subsection-field').style.display=freq==='daily'?'':'none';
  if(freq==='weekly'&&chore.due_day) document.getElementById('m-day').value=chore.due_day;
  if((freq==='monthly'||freq==='occasional')&&chore.last_done) document.getElementById('m-lastdone').value=chore.last_done;
  if(freq==='occasional') document.getElementById('m-interval').value=chore.sort_order||180;
  if(freq==='daily'){
    const s=chore.sub_section;
    document.getElementById('m-subsection').value=(s==='Morning'||s==='Daytime')?'AM':(s==='Evening')?'PM':s||'AM';
  }
  document.getElementById('modal').classList.add('open');
}

async function saveChore(){
  if(!activeChoreId) return;
  const updates={name:document.getElementById('m-name').value.trim(),assigned_to:document.getElementById('m-assign').value};
  if(activeFreq==='daily'){updates.streak=parseInt(document.getElementById('m-streak').value)||0;updates.sub_section=document.getElementById('m-subsection').value;}
  if(activeFreq==='weekly') updates.due_day=document.getElementById('m-day').value;
  if(activeFreq==='monthly') updates.last_done=document.getElementById('m-lastdone').value||null;
  if(activeFreq==='occasional'){updates.last_done=document.getElementById('m-lastdone').value||null;updates.sort_order=parseInt(document.getElementById('m-interval').value)||180;}
  try{
    await api('chores?id=eq.'+activeChoreId,'PATCH',updates);
    const idx=allChores.findIndex(c=>c.id===activeChoreId);
    if(idx>=0) allChores[idx]={...allChores[idx],...updates};
    closeModal();renderAll();showToast('Saved');
  }catch(e){showToast('Error saving');}
}

async function deleteChore(){
  if(!activeChoreId||!confirm('Delete this chore?')) return;
  try{
    await api('chores?id=eq.'+activeChoreId,'DELETE');
    allChores=allChores.filter(c=>c.id!==activeChoreId);
    closeModal();renderAll();updateStats();showToast('Deleted');
  }catch(e){showToast('Error deleting');}
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  activeChoreId=null;activeFreq=null;
}

function showTab(name,btn){
  ['daily','weekly','monthly','occasional','rewards','activity'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeTab=name;
  if(name==='rewards') renderRewards();
  if(name==='activity') reloadActivity();
}

async function reloadActivity(){
  try{
    const [comps,redemptions]=await Promise.all([
      api('completions?order=completed_at.desc&limit=80'),
      api('redemptions?order=created_at.desc')
    ]);
    renderActivity(comps||[],redemptions||[]);
  }catch(e){}
}

async function refreshData(){
  showToast('Refreshing...');
  await loadAll();
  showToast('Up to date');
}

function setWho(who,btn){
  currentWho=who;
  document.querySelectorAll('.who-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function esc(str){
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this) closeModal();});
loadAll();
</script>
</body>
</html>
